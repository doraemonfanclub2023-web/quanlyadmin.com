<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DORAEMON ADMIN</title>
    <style>
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>DORAEMON ADMIN</h2>
    <input type="text" id="username" placeholder="Mã tài khoản">
    <input type="password" id="password" placeholder="Mật khẩu">
    <button id="loginBtn">ĐĂNG NHẬP</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://admin-27099-default-rtdb.firebaseio.com/" }));

    document.getElementById('loginBtn').onclick = async () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        
        // Tự quét toàn bộ dữ liệu gốc
        const snap = await get(ref(db));
        let found = false;
        
        if (snap.exists()) {
            const data = snap.val();
            // Lặp qua các nhánh chính (BQT001, BQT002...)
            for (let branch in data) {
                if (data[branch][u] && data[branch][u].password == p) {
                    found = true;
                    break;
                }
            }
        }

        if (found) {
            sessionStorage.setItem("auth", "true");
            window.location.href = "dashboard.html";
        } else {
            alert("Sai mã hoặc mật khẩu!");
        }
    };
</script>
</body>
</html>

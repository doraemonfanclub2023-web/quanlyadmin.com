<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Doraemon Admin</title>
    <style>
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>DORAEMON ADMIN</h2>
    <input type="text" id="username" placeholder="Mã tài khoản (Ví dụ: DEV001)">
    <input type="password" id="password" placeholder="Mật khẩu">
    <button onclick="login()">ĐĂNG NHẬP HỆ THỐNG</button>
    <p id="msg" style="color: red; margin-top: 10px; display: none;">Sai tài khoản/mật khẩu!</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const app = initializeApp({
        apiKey: "AIzaSyC-U9L1plaQ6pcP7Iecg4RO0GirBjunISM",
        authDomain: "admin-27099.firebaseapp.com",
        projectId: "admin-27099",
        storageBucket: "admin-27099.firebasestorage.app",
        messagingSenderId: "510976750235",
        appId: "1:510976750235:web:78d3e138d302235a788c3e"
    });

    const auth = getAuth(app);
    
    // Đưa hàm login ra window để nút bấm có thể gọi
    window.login = async () => {
        const user = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();
        const msg = document.getElementById('msg');
        
        try {
            // Tự động ghép đuôi để khớp với user đã tạo trên Firebase
            await signInWithEmailAndPassword(auth, `${user}@doraadmin.com`, pass);
            window.location.href = "dashboard.html";
        } catch (e) {
            msg.style.display = 'block';
        }
    };
</script>
</body>
</html>

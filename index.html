<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Quản trị Doraemon Fanclub</title>
    <!-- Giữ nguyên tên file style.css -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-container">
    <h1>DORAEMON ADMIN</h1>
    <p class="subtitle">Hệ thống Quản lý Nội bộ Fanclub</p>
    
    <div class="form-group">
        <label for="username">Mã tài khoản</label>
        <input type="text" id="username" placeholder="Nhập mã tài khoản...">
    </div>
    
    <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu...">
    </div>
    
    <div id="error" class="error-msg" style="display: none;"></div>
    
    <!-- Gọi đúng hàm window.handleLogin trong script.js của bồ -->
    <button onclick="window.handleLogin(event)" class="btn-login">ĐĂNG NHẬP HỆ THỐNG</button>
    
    <p class="footer-text">© 2026 Doraemon Fanclub Vietnam</p>
</div>

<!-- ĐÚNG TÊN FILE SCRIPT.JS CỦA BỒ -->
<script type="module" src="script.js"></script>

</body>
</html>

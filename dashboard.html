<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dora Admin 2.0</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0f172a;
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            z-index: 99999;
            font-size: 14px;
            font-weight: 500;
            max-width: 350px;
            animation: slideIn 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-left: 4px solid #0284c7;
        }
        .toast-success { border-left-color: #10b981; }
        .toast-warning { border-left-color: #f59e0b; }
        .toast-error { border-left-color: #ef4444; }
    </style>
</head>
<body>

<!-- ===== NÚT TOGGLE MENU CHO MOBILE ===== -->
<button class="menu-toggle" onclick="window.toggleMenu()">☰</button>
<div class="sidebar-overlay" onclick="window.toggleMenu()"></div>

<div class="dashboard">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
        <div class="brand">
            <img src="https://i.postimg.cc/Z57X57Gp/Chua-co-ten-(Logo)-(1).png" alt="Logo" />
            <h3>DORA ADMIN</h3>
            <span>Hệ thống quản trị</span>
        </div>
        <nav>
            <a href="#" data-page="home" class="active">🏠 Trang chủ</a>
            <a href="#" data-page="users">👥 Thành viên</a>
            <a href="#" data-page="notices">📢 Thông báo</a>
            <a href="#" data-page="documents">📄 Văn bản</a>
            <a href="#" data-page="tests">📝 Test kỹ năng</a>
            <a href="#" data-page="games">🎮 Game</a>
            <a href="#" data-page="settings">⚙️ Cài đặt</a>
            <a href="#" data-page="profile">👤 Hồ sơ</a>
        </nav>
        <div class="user-info">
            <div class="name">Đang tải...</div>
            <div class="role">...</div>
            <button onclick="window.logout()">🚪 Đăng xuất</button>
        </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">
        <div class="page-header">
            <h2 id="pageTitle">Trang chủ</h2>
        </div>
        <div id="pageContent"></div>
    </main>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module">
    // ============================================================
    // IMPORT
    // ============================================================
    import { db, ref, get, set, update, remove, push, onValue } from "./js/firebase.js";

    // ============================================================
    // KIỂM TRA ĐĂNG NHẬP
    // ============================================================
    function checkAuth() {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user) {
            window.location.href = "index.html";
            return null;
        }
        return user;
    }

    // ============================================================
    // TOGGLE MENU
    // ============================================================
    window.toggleMenu = function() {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.querySelector('.sidebar-overlay');
        if (sidebar) sidebar.classList.toggle('open');
        if (overlay) overlay.classList.toggle('active');
    };

    // ============================================================
    // TOAST THÔNG BÁO
    // ============================================================
    function showToast(message, type = 'info') {
        const oldToast = document.querySelector('.toast-notification');
        if (oldToast) oldToast.remove();
        
        const toast = document.createElement('div');
        const colors = {
            info: '#0f172a',
            success: '#065f46',
            warning: '#92400e',
            error: '#7f1d1d'
        };
        const borderColors = {
            info: '#0284c7',
            success: '#10b981',
            warning: '#f59e0b',
            error: '#ef4444'
        };
        toast.className = `toast-notification toast-${type}`;
        toast.style.cssText = `
            position: fixed; bottom: 30px; right: 30px;
            background: ${colors[type] || colors.info};
            color: white; padding: 14px 24px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            z-index: 99999; font-size: 14px; font-weight: 500;
            max-width: 350px;
            animation: slideIn 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-left: 4px solid ${borderColors[type] || borderColors.info};
        `;
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(20px)';
            toast.style.transition = 'all 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // ============================================================
    // KHỞI TẠO
    // ============================================================
    document.addEventListener("DOMContentLoaded", function() {
        const user = checkAuth();
        if (!user) return;

        document.querySelector(".user-info .name").textContent = user.name || user.username;
        document.querySelector(".user-info .role").textContent = user.role || "Admin";

        document.querySelectorAll(".sidebar nav a").forEach(link => {
            link.addEventListener("click", function(e) {
                e.preventDefault();
                const page = this.dataset.page;
                if (page) {
                    window.showPage(page);
                    if (window.innerWidth <= 768) window.toggleMenu();
                }
            });
        });

        window.showPage("home");
    });

    window.addEventListener('resize', function() {
        if (window.innerWidth > 768) {
            document.querySelector('.sidebar')?.classList.remove('open');
            document.querySelector('.sidebar-overlay')?.classList.remove('active');
        }
    });

    // ============================================================
    // SHOW PAGE
    // ============================================================
    window.showPage = function(pageId) {
        const user = checkAuth();
        if (!user) return;

        if (pageId === "settings" && user.role !== "Ban Quản Trị") {
            alert("⛔ Bạn không có quyền truy cập Cài đặt!");
            return;
        }

        document.querySelectorAll(".sidebar nav a").forEach(el => el.classList.remove("active"));
        const menu = document.querySelector(`.sidebar nav a[data-page="${pageId}"]`);
        if (menu) menu.classList.add("active");

        const titles = {
            home: "🏠 Trang chủ",
            users: "👥 Quản lý thành viên",
            notices: "📢 Quản lý thông báo",
            documents: "📄 Quản lý văn bản",
            tests: "📝 Quản lý test kỹ năng",
            games: "🎮 Game nội bộ",
            settings: "⚙️ Cài đặt hệ thống",
            profile: "👤 Hồ sơ cá nhân"
        };
        document.getElementById("pageTitle").textContent = titles[pageId] || "Trang";

        const content = document.getElementById("pageContent");
        if (!content) return;

        content.innerHTML = "";

        switch(pageId) {
            case "home": 
                content.innerHTML = getHomePage(); 
                loadHomeData(); 
                break;
            case "users": 
                content.innerHTML = getUsersPage(user); 
                loadUsers(); 
                break;
            case "notices": 
                content.innerHTML = getNoticesPage(user); 
                loadNotices(); 
                break;
            case "documents": 
                content.innerHTML = getDocumentsPage(user); 
                loadDocuments(); 
                break;
            case "tests":
                content.innerHTML = getTestsPage(user);
                loadTests();
                loadDeadline();
                break;
            case "games":
                console.log("🎮 ĐANG VÀO TRANG GAME!");
                content.innerHTML = getGamesPage(user);
                loadGames();
                loadScores();
                setTimeout(function() {
                    canvasReady = false;
                    initGameCanvas();
                }, 300);
                break;
            case "settings": 
                content.innerHTML = getSettingsPage(user); 
                loadSettings(); 
                break;
            case "profile": 
                content.innerHTML = getProfilePage(user); 
                loadProfile(); 
                break;
            default: 
                content.innerHTML = "<h2>Trang đang phát triển</h2>";
        }
    };

    // ============================================================
    // TRANG CHỦ
    // ============================================================
    function getHomePage() {
        return `
            <div class="cards">
                <div class="card" onclick="window.showPage('users')" style="cursor:pointer;">
                    <h3>👥 Thành viên</h3>
                    <h1 id="totalUsers">...</h1>
                </div>
                <div class="card" onclick="window.showPage('notices')" style="cursor:pointer;">
                    <h3>📢 Thông báo</h3>
                    <h1 id="totalNotices">...</h1>
                </div>
                <div class="card" onclick="window.showPage('documents')" style="cursor:pointer;">
                    <h3>📄 Văn bản</h3>
                    <h1 id="totalDocs">...</h1>
                </div>
                <div class="card" onclick="window.showPage('tests')" style="cursor:pointer;">
                    <h3>📝 Bài test</h3>
                    <h1 id="totalTests">...</h1>
                </div>
            </div>
            <div class="account-form-box">
                <h3>📋 Hoạt động gần đây</h3>
                <div id="recentActivities">🟢 Hệ thống đang hoạt động bình thường</div>
            </div>
        `;
    }

    function loadHomeData() {
        onValue(ref(db, "users"), s => document.getElementById("totalUsers").textContent = s.exists() ? Object.keys(s.val()).length : "0");
        onValue(ref(db, "notices"), s => document.getElementById("totalNotices").textContent = s.exists() ? Object.keys(s.val()).length : "0");
        onValue(ref(db, "documents"), s => document.getElementById("totalDocs").textContent = s.exists() ? Object.keys(s.val()).length : "0");
        onValue(ref(db, "tests"), s => document.getElementById("totalTests").textContent = s.exists() ? Object.keys(s.val()).length : "0");
    }

    // ============================================================
    // QUẢN LÝ THÀNH VIÊN
    // ============================================================
    function getUsersPage(user) {
        const canManage = user.role !== "Admin";
        let html = `<h2>👥 Quản lý thành viên</h2>`;
        if (canManage) {
            html += `
                <div class="account-form-box">
                    <h3>➕ Thêm tài khoản mới</h3>
                    <div class="inline-form">
                        <input type="text" id="newUsername" placeholder="Mã tài khoản" />
                        <input type="text" id="newName" placeholder="Họ và tên" />
                        <input type="password" id="newPassword" placeholder="Mật khẩu" />
                        <select id="newRole">
                            <option value="Admin">Admin</option>
                            <option value="Ban Quản Trị">Ban Quản Trị</option>
                        </select>
                        <button onclick="window.addAccount()" class="btn-create">Tạo</button>
                    </div>
                </div>
            `;
        } else {
            html += `<p style="color:#94a3b8; margin-bottom:16px;">🔒 Bạn ở chế độ chỉ xem.</p>`;
        }
        html += `
            <div class="table-container">
                <table class="table">
                    <thead><tr><th>Mã</th><th>Tên</th><th>Chức vụ</th><th>Thao tác</th></tr></thead>
                    <tbody id="userTableBody"><tr><td colspan="4">Đang tải...</td></tr></tbody>
                </table>
            </div>
        `;
        return html;
    }

    function loadUsers() {
        const tbody = document.getElementById("userTableBody");
        if (!tbody) return;
        const currentUser = JSON.parse(localStorage.getItem("currentUser"));
        const isAdmin = currentUser?.role === "Admin";

        onValue(ref(db, "users"), snapshot => {
            tbody.innerHTML = "";
            if (!snapshot.exists()) {
                tbody.innerHTML = '<tr><td colspan="4">Chưa có tài khoản</td></tr>';
                return;
            }
            snapshot.forEach(child => {
                const u = child.val();
                const key = child.key;
                let actions = "";
                if (isAdmin) {
                    actions = '<span class="badge-default">Chỉ xem</span>';
                } else if (u.username === "BQT001" || u.username === "BQT002") {
                    actions = '<span style="color:#94a3b8;">Hệ thống</span>';
                } else {
                    actions = `
                        <button onclick="window.changePassword('${key}')" class="btn-edit">Đổi MK</button>
                        <button onclick="window.deleteAccount('${key}')" class="btn-delete">Xóa</button>
                    `;
                }
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${u.username}</strong></td>
                        <td>${u.name || u.username}</td>
                        <td>${u.role || "Admin"}</td>
                        <td>${actions}</td>
                    </tr>
                `;
            });
        });
    }

    window.addAccount = async function() {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user || user.role === "Admin") return alert("⛔ Bạn không có quyền thêm tài khoản!");
        const username = document.getElementById("newUsername")?.value.trim();
        const name = document.getElementById("newName")?.value.trim();
        const password = document.getElementById("newPassword")?.value.trim();
        const role = document.getElementById("newRole")?.value;
        if (!username || !password) return alert("⚠️ Vui lòng nhập Mã và Mật khẩu!");
        try {
            if ((await get(ref(db, 'users/' + username))).exists()) return alert("❌ Mã tài khoản đã tồn tại!");
            await set(ref(db, 'users/' + username), { username, name: name || username, password, role: role || "Admin" });
            alert("✅ Tạo tài khoản thành công!");
            document.getElementById("newUsername").value = "";
            document.getElementById("newName").value = "";
            document.getElementById("newPassword").value = "";
        } catch (e) { console.error(e); alert("⚠️ Lỗi khi tạo tài khoản!"); }
    };

    window.deleteAccount = async function(username) {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user || user.role === "Admin") return alert("⛔ Bạn không có quyền xóa!");
        if (username === "BQT001" || username === "BQT002") return alert("⛔ Không thể xóa tài khoản hệ thống!");
        if (!confirm('Xóa tài khoản "' + username + '"?')) return;
        try { await remove(ref(db, 'users/' + username)); alert("✅ Đã xóa thành công!"); } catch (e) { console.error(e); alert("⚠️ Lỗi khi xóa!"); }
    };

    window.changePassword = async function(username) {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user || user.role === "Admin") return alert("⛔ Bạn không có quyền đổi mật khẩu!");
        const newPass = prompt('Nhập mật khẩu mới cho "' + username + '":');
        if (newPass === null) return;
        const clean = newPass.trim();
        if (!clean) return alert("⚠️ Mật khẩu không được để trống!");
        try { await update(ref(db, 'users/' + username), { password: clean }); alert("✅ Đổi mật khẩu thành công!"); } catch (e) { console.error(e); alert("⚠️ Lỗi khi đổi mật khẩu!"); }
    };

    // ============================================================
    // THÔNG BÁO
    // ============================================================
    function getNoticesPage(user) {
        const canManage = user.role !== "Admin";
        let html = `<h2>📢 Quản lý thông báo</h2>`;
        if (canManage) {
            html += `
                <div class="account-form-box">
                    <h3>📝 Soạn thông báo mới</h3>
                    <div style="display:flex; flex-direction:column; gap:12px;">
                        <input type="text" id="noticeTitle" placeholder="📌 Tiêu đề thông báo..." />
                        <textarea id="noticeContent" placeholder="📝 Nội dung thông báo..."></textarea>
                        <button onclick="window.addNotice()" class="btn-create" style="align-self:flex-start;">📤 Đăng thông báo</button>
                    </div>
                </div>
            `;
        } else {
            html += `<p style="color:#94a3b8; margin-bottom:16px;">🔒 Chế độ chỉ xem.</p>`;
        }
        html += `
            <div class="table-container">
                <table class="table">
                    <thead><tr><th>Ngày</th><th>Tiêu đề</th><th>Nội dung</th><th>Thao tác</th></tr></thead>
                    <tbody id="noticeTableBody"><tr><td colspan="4">📭 Đang tải...</td></tr></tbody>
                </table>
            </div>
        `;
        return html;
    }

    function loadNotices() {
        const tbody = document.getElementById("noticeTableBody");
        if (!tbody) return;
        const user = JSON.parse(localStorage.getItem("currentUser"));
        const isAdmin = user?.role === "Admin";

        onValue(ref(db, "notices"), snapshot => {
            tbody.innerHTML = "";
            if (!snapshot.exists()) {
                tbody.innerHTML = '<tr><td colspan="4">📭 Chưa có thông báo nào</td></tr>';
                return;
            }
            const notices = [];
            snapshot.forEach(child => {
                const data = child.val();
                if (data && typeof data === 'object') {
                    notices.push({
                        key: child.key,
                        title: data.title || "📌 Không có tiêu đề",
                        content: data.content || "Không có nội dung",
                        date: data.date || "N/A",
                        author: data.author || "Unknown"
                    });
                }
            });
            notices.reverse();
            if (notices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">📭 Chưa có thông báo nào</td></tr>';
                return;
            }
            notices.forEach(n => {
                const actions = isAdmin ? 
                    '<span class="badge-default">Chỉ xem</span>' : 
                    `<button onclick="window.deleteNotice('${n.key}')" class="btn-delete">🗑️ Xóa</button>`;
                tbody.innerHTML += `
                    <tr>
                        <td><span style="font-size:12px; color:#64748b;">${n.date}</span></td>
                        <td><strong>${n.title}</strong></td>
                        <td style="max-width:300px; word-wrap:break-word;">${n.content}</td>
                        <td>${actions}</td>
                    </tr>
                `;
            });
        });
    }

    window.addNotice = async function() {
        try {
            const user = JSON.parse(localStorage.getItem("currentUser"));
            if (!user) return alert("⚠️ Vui lòng đăng nhập lại!");
            if (user.role === "Admin") return alert("⛔ Admin không có quyền đăng thông báo!");

            const titleInput = document.getElementById("noticeTitle");
            const contentInput = document.getElementById("noticeContent");
            if (!titleInput || !contentInput) return alert("⚠️ Không tìm thấy form nhập liệu!");

            const title = titleInput.value.trim();
            const content = contentInput.value.trim();
            if (!title) return alert("⚠️ Vui lòng nhập tiêu đề!");
            if (!content) return alert("⚠️ Vui lòng nhập nội dung!");

            const d = new Date();
            const date = String(d.getDate()).padStart(2, "0") + "/" + String(d.getMonth() + 1).padStart(2, "0") + "/" + d.getFullYear();
            const time = String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");

            await push(ref(db, "notices"), {
                title, content,
                date: date + " " + time,
                author: user.name || user.username || "Unknown"
            });

            alert("✅ Đăng thông báo thành công!");
            titleInput.value = "";
            contentInput.value = "";
        } catch (e) { console.error(e); alert("⚠️ Lỗi khi đăng thông báo!"); }
    };

    window.deleteNotice = async function(key) {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user || user.role === "Admin") return alert("⛔ Bạn không có quyền xóa!");
        if (!confirm("🗑️ Xóa thông báo này?")) return;
        try { await remove(ref(db, 'notices/' + key)); alert("✅ Đã xóa thông báo!"); } catch (e) { console.error(e); alert("⚠️ Lỗi khi xóa!"); }
    };

    // ============================================================
    // QUẢN LÝ VĂN BẢN (CÓ NÚT SỬA CHO BQT)
    // ============================================================
    function getDocumentsPage(user) {
        const canManage = user.role !== "Admin";
        let html = `<h2>📄 Quản lý văn bản hành chính</h2>`;
        if (canManage) {
            html += `
                <div class="account-form-box">
                    <h3>📝 Thêm văn bản mới</h3>
                    <div style="display:flex; flex-direction:column; gap:12px;">
                        <div style="display:flex; gap:12px; flex-wrap:wrap;">
                            <input type="text" id="docSoVanBan" placeholder="Số văn bản (VD: 06/QĐ-BQT)" style="flex:1; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px;" />
                            <select id="docLoai" style="flex:1; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px;">
                                <option value="Quyết định">📄 Quyết định</option>
                                <option value="Công văn">📨 Công văn</option>
                                <option value="Nghị quyết">📋 Nghị quyết</option>
                                <option value="Biên bản">📑 Biên bản</option>
                                <option value="Quy chế">⚖️ Quy chế</option>
                            </select>
                        </div>
                        <input type="text" id="docTieuDe" placeholder="Tiêu đề văn bản..." style="padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px;" />
                        <textarea id="docNoiDung" placeholder="Nội dung văn bản..." style="min-height:100px; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px; resize:vertical;"></textarea>
                        <div style="display:flex; gap:12px; flex-wrap:wrap;">
                            <input type="text" id="docNguoiKy" placeholder="Người ký..." style="flex:1; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px;" />
                            <input type="date" id="docNgayBanHanh" style="flex:1; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px;" />
                        </div>
                        <div style="border:1px dashed #0284c7; border-radius:8px; padding:16px; background:#f0f9ff; margin-top:4px;">
                            <h4 style="margin:0 0 10px 0; color:#0284c7; font-size:14px;">📎 Đính kèm file</h4>
                            <div style="display:flex; gap:12px; flex-wrap:wrap;">
                                <input type="url" id="docFileUrl" placeholder="Link file đính kèm (Google Drive, PDF...)" style="flex:2; min-width:200px; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px;" />
                                <input type="text" id="docFileName" placeholder="Tên file hiển thị" style="flex:1; min-width:120px; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px;" />
                            </div>
                            <p style="font-size:12px; color:#64748b; margin-top:8px; margin-bottom:0;">
                                💡 Dán link Google Drive, OneDrive hoặc URL file PDF để đính kèm.
                            </p>
                        </div>
                        <button onclick="window.addDocument()" class="btn-create" style="align-self:flex-start; padding:10px 24px;">📤 Đăng văn bản</button>
                    </div>
                </div>
            `;
        } else {

    // ===== TẢI DANH SÁCH VĂN BẢN (CÓ NÚT SỬA) =====
    function loadDocuments() {
        const tbody = document.getElementById("docTableBody");
        if (!tbody) return;
        const user = JSON.parse(localStorage.getItem("currentUser"));
        const isAdmin = user?.role === "Admin";
        const isBQT = user?.role === "Ban Quản Trị";
        const colors = { 
            "Quyết định": "#3b82f6", 
            "Công văn": "#10b981", 
            "Nghị quyết": "#f59e0b", 
            "Biên bản": "#8b5cf6", 
            "Quy chế": "#ef4444" 
        };

        onValue(ref(db, "documents"), snapshot => {
            tbody.innerHTML = "";
            if (!snapshot.exists()) { 
                tbody.innerHTML = '<tr><td colspan="7">📭 Chưa có văn bản nào</td></tr>'; 
                return; 
            }
            const docs = [];
            snapshot.forEach(child => {
                const data = child.val();
                if (data && typeof data === 'object') {
                    docs.push({ key: child.key, ...data });
                }
            });
            docs.reverse().forEach(doc => {
                // ===== XÁC ĐỊNH QUYỀN =====
                let actions = "";
                if (isBQT) {
                    actions = `
                        <button onclick="window.editDocument('${doc.key}')" class="btn-edit" style="font-size:11px; padding:2px 10px; background:#8b5cf6;">✏️ Sửa</button>
                        <button onclick="window.deleteDocument('${doc.key}')" class="btn-delete" style="font-size:11px; padding:2px 10px;">🗑️ Xóa</button>
                    `;
                } else if (isAdmin) {
                    actions = '<span class="badge-default">Chỉ xem</span>';
                } else {
                    actions = `<span class="badge-default">Chỉ xem</span>`;
                }
                
                const color = colors[doc.loai] || "#64748b";
                
                let fileHtml = '—';
                if (doc.fileUrl && doc.fileUrl.trim().length > 0) {
                    const displayName = doc.fileName || '📎 Tải file';
                    fileHtml = `<a href="${doc.fileUrl}" target="_blank" style="color:#0284c7; text-decoration:none; font-size:18px; display:inline-block; padding:4px 8px; border-radius:6px; background:#e0f2fe;" title="${displayName}">📎</a>`;
                }
                
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${doc.soVanBan || "N/A"}</strong></td>
                        <td><span style="background:${color}; color:white; padding:2px 10px; border-radius:12px; font-size:12px;">${doc.loai || "Khác"}</span></td>
                        <td>${doc.tieuDe || ""}</td>
                        <td>${doc.ngayBanHanh || "N/A"}</td>
                        <td>${doc.nguoiKy || "N/A"}</td>
                        <td style="text-align:center; font-size:18px;">${fileHtml}</td>
                        <td>${actions}</td>
                    </tr>
                `;
            });
        });
    }

    window.addDocument = async function() {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user || user.role === "Admin") return alert("⛔ Bạn không có quyền thêm văn bản!");
        
        const so = document.getElementById("docSoVanBan")?.value.trim();
        const loai = document.getElementById("docLoai")?.value;

        const noiDung = document.getElementById("docNoiDung")?.value.trim();
        const nguoiKy = document.getElementById("docNguoiKy")?.value.trim();
        const ngay = document.getElementById("docNgayBanHanh")?.value;
        const fileUrl = document.getElementById("docFileUrl")?.value.trim();

            document.getElementById("docSoVanBan").value = "";
            document.getElementById("docTieuDe").value = "";
            document.getElementById("docNoiDung").value = "";
            document.getElementById("docNguoiKy").value = "";
            document.getElementById("docNgayBanHanh").value = "";
            document.getElementById("docFileUrl").value = "";
            document.getElementById("docFileName").value = "";

    // ===== TÌM KIẾM VĂN BẢN (CÓ NÚT SỬA) =====
    window.searchDocuments = function() {
        const keyword = document.getElementById("docSearch")?.value.trim().toLowerCase();
        const filter = document.getElementById("docFilterType")?.value;
        if (!keyword && filter === "all") { loadDocuments(); return; }
        const tbody = document.getElementById("docTableBody");
        if (!tbody) return;
        const user = JSON.parse(localStorage.getItem("currentUser"));
        const isBQT = user?.role === "Ban Quản Trị";
        const colors = { 
            "Quyết định": "#3b82f6", 
            "Công văn": "#10b981", 
            "Nghị quyết": "#f59e0b", 
            "Biên bản": "#8b5cf6", 
            "Quy chế": "#ef4444" 
        };
        get(ref(db, "documents")).then(snapshot => {
            tbody.innerHTML = "";
            if (!snapshot.exists()) { 
                tbody.innerHTML = '<tr><td colspan="7">Không có kết quả</td></tr>'; 
                return; 
            }
            let found = false;
            snapshot.forEach(child => {
                const doc = child.val();
                let match = true;
                if (filter !== "all" && doc.loai !== filter) match = false;
                if (keyword && !doc.soVanBan?.toLowerCase().includes(keyword) && 
                    !doc.tieuDe?.toLowerCase().includes(keyword)) match = false;
                if (match) {
                    found = true;
                    const color = colors[doc.loai] || "#64748b";
                    
                    let actions = "";
                    if (isBQT) {
                        actions = `
                            <button onclick="window.editDocument('${doc.key}')" class="btn-edit" style="font-size:11px; padding:2px 10px; background:#8b5cf6;">✏️ Sửa</button>
                            <button onclick="alert('📄 ${doc.tieuDe}\\n\\n${doc.noiDung || "Không có nội dung"}')" class="btn-edit">Xem</button>
                        `;
                    } else {
                        actions = `<button onclick="alert('📄 ${doc.tieuDe}\\n\\n${doc.noiDung || "Không có nội dung"}')" class="btn-edit">Xem</button>`;
                    }
                    
                    let fileHtml = '—';
                    if (doc.fileUrl && doc.fileUrl.trim().length > 0) {
                        const displayName = doc.fileName || '📎 Tải file';
                        fileHtml = `<a href="${doc.fileUrl}" target="_blank" style="color:#0284c7; text-decoration:none; font-size:18px; display:inline-block; padding:4px 8px; border-radius:6px; background:#e0f2fe;" title="${displayName}">📎</a>`;
                    }
                    
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${doc.soVanBan || "N/A"}</strong></td>
                            <td><span style="background:${color}; color:white; padding:2px 10px; border-radius:12px; font-size:12px;">${doc.loai || "Khác"}</span></td>
                            <td>${doc.tieuDe || ""}</td>
                            <td>${doc.ngayBanHanh || "N/A"}</td>
                            <td>${doc.nguoiKy || "N/A"}</td>
                            <td style="text-align:center; font-size:18px;">${fileHtml}</td>
                            <td>${actions}</td>
                        </tr>
                    `;
                }
            });
            if (!found) tbody.innerHTML = '<tr><td colspan="7">Không tìm thấy văn bản phù hợp</td></tr>';
        }).catch(() => tbody.innerHTML = '<tr><td colspan="7">⚠️ Lỗi tìm kiếm</td></tr>');
    };

    function parseQuestions(text) {
        const lines = text.split('\n');
        const questions = [];
        let currentQ = null;
        let currentOpts = [];
        
        for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed) continue;
            
            const qMatch = trimmed.match(/^(Câu\s*)?(\d+)[:\.]\s*(.*)/i);
            if (qMatch) {
                if (currentQ && currentOpts.length > 0) {
                    questions.push({ question: currentQ, options: currentOpts });
                }
                currentQ = qMatch[3] || trimmed;
                currentOpts = [];
            } else {
                const oMatch = trimmed.match(/^([a-dA-D])[\.\)]\s*(.*)/i);
                if (oMatch && currentQ !== null) {
                    let opt = oMatch[1].toLowerCase() + '. ' + oMatch[2];
                    if (oMatch[2].trim().startsWith('*')) {
                        opt = '*' + opt;
                    }
                    currentOpts.push(opt);
                } else {
                    if (currentQ !== null && currentOpts.length === 0) {
                        currentQ += ' ' + trimmed;
                    }
                }
            }
        }
        if (currentQ && currentOpts.length > 0) {
            questions.push({ question: currentQ, options: currentOpts });
        }
        return questions;
    }

    window.editTest = async function(key) {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user || user.role !== "Ban Quản Trị") return alert("⛔ Chỉ Ban Quản Trị mới có quyền sửa test!");
        try {
            const snap = await get(ref(db, 'tests/' + key));
            if (!snap.exists()) return alert("Bài test không tồn tại!");
            const test = snap.val();
            const newTitle = prompt("✏️ Sửa tiêu đề:", test.title);
            if (newTitle === null) return;
            const newDesc = prompt("✏️ Sửa mô tả:", test.desc);
            if (newDesc === null) return;
            const newPass = prompt("✏️ Sửa điểm đạt:", test.passScore);
            if (newPass === null) return;
            const newDeadline = prompt("✏️ Sửa hạn nộp:", test.deadline || "Không thời hạn");
            if (newDeadline === null) return;
            const testType = test.testType || (test.embedCode ? 'embed' : 'manual');
            let newEmbed = test.embedCode || "";
            let newQuestions = test.questions || [];
            if (testType === 'embed') {
                const embedInput = prompt("✏️ Sửa mã nhúng (bỏ trống nếu không có):", test.embedCode || "");
                if (embedInput === null) return;
                newEmbed = embedInput.trim();
            } else {
                let qText = "";
                if (test.questions && test.questions.length > 0) {
                    test.questions.forEach((q, idx) => {
                        qText += "Câu " + (idx + 1) + ": " + q.question + "\n";
                        q.options.forEach(o => qText += o + "\n");
                        qText += "\n";
                    });
                }
                const newQText = prompt("✏️ Sửa câu hỏi (giữ nguyên định dạng):", qText);
                if (newQText === null) return;
                const parsed = parseQuestions(newQText);
                if (parsed.length === 0) return alert("⚠️ Không tìm thấy câu hỏi hợp lệ!");
                for (let i = 0; i < parsed.length; i++) {
                    if (parsed[i].options.length < 4) return alert("⚠️ Câu " + (i + 1) + " thiếu đáp án!");
                    if (!parsed[i].options.some(o => o.startsWith('*'))) return alert("⚠️ Câu " + (i + 1) + " chưa có đáp án đúng!");
                }
                newQuestions = parsed;
            }
            await update(ref(db, 'tests/' + key), {
                title: newTitle.trim(),
                desc: newDesc.trim(),
                questions: newQuestions,
                passScore: parseInt(newPass) || 50,
                deadline: newDeadline.trim(),
                embedCode: newEmbed || "",
                totalQuestions: testType === 'manual' ? newQuestions.length : 0,
                updatedAt: new Date().toISOString()
            });
            alert("✅ Cập nhật test thành công!");
        } catch (e) {
            console.error(e);
            alert("⚠️ Lỗi khi sửa test!");
        }
    };

    window.startTest = async function(key) {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user) return alert("⚠️ Vui lòng đăng nhập!");
        try {
            const snap = await get(ref(db, 'tests/' + key));
            if (!snap.exists()) return alert("Bài test không tồn tại!");
            const test = snap.val();
            if (test.embedCode && test.embedCode.trim().length > 0) {
                window.viewEmbed(key);
                return;
            }
            if (!test.questions || test.questions.length === 0) {
                alert("⚠️ Bài test này chưa có câu hỏi!");
                return;
            }
            if (!confirm('📝 ' + test.title + '\n\n' + test.desc + '\n\nSố câu hỏi: ' + test.questions.length + '\nĐiểm đạt: ' + test.passScore + '%\n\nBắt đầu làm test?')) return;
            let score = 0;
            const answers = [];
            for (let i = 0; i < test.questions.length; i++) {
                const q = test.questions[i];
                const opts = q.options.map((o, idx) => {
                    const letter = String.fromCharCode(65 + idx);
                    return letter + '. ' + (o.startsWith('*') ? o.substring(1) : o);
                }).join('\n');
                let ans = prompt('📝 Câu ' + (i + 1) + '/' + test.questions.length + '\n\n' + q.question + '\n\n' + opts + '\n\nNhập đáp án (A, B, C, D):');
                if (ans === null) break;
                ans = ans.trim().toUpperCase();
                let idx = -1;
                if (ans === 'A') idx = 0;
                else if (ans === 'B') idx = 1;
                else if (ans === 'C') idx = 2;
                else if (ans === 'D') idx = 3;
                if (idx === -1 || idx >= q.options.length) {
                    alert('⚠️ Đáp án không hợp lệ! Vui lòng nhập A, B, C hoặc D.');
                    i--;
                    continue;
                }
                const correct = q.options[idx].startsWith('*');
                if (correct) score++;
                answers.push({
                    question: q.question,
                    selected: q.options[idx],
                    correct: correct
                });
            }
            const finalScore = Math.round((score / test.questions.length) * 100);
            const passed = finalScore >= test.passScore;
            const rank = finalScore >= 90 ? "🏆 Xuất sắc" : 
                        finalScore >= 75 ? "⭐ Giỏi" : 
                        finalScore >= 50 ? "📖 Khá" : 
                        finalScore >= 30 ? "📝 Trung bình" : "❌ Yếu";
            let msg = '📊 KẾT QUẢ\n\n';
            msg += 'Điểm: ' + finalScore + '/100\n';
            msg += 'Xếp loại: ' + rank + '\n';
            msg += 'Kết quả: ' + (passed ? "✅ Đạt" : "❌ Không đạt") + '\n';
            msg += 'Trả lời đúng: ' + score + '/' + test.questions.length + ' câu\n\n';
            answers.forEach((a, idx) => {
                msg += 'Câu ' + (idx + 1) + ': ' + (a.correct ? '✅ Đúng' : '❌ Sai') + '\n';
                msg += '   Đáp án: ' + a.selected + '\n';
            });
            alert(msg);
            await push(ref(db, "testResults"), {
                testId: key,
                testTitle: test.title,
                username: user.username,
                userName: user.name || user.username,
                score: finalScore,
                correctCount: score,
                totalQuestions: test.questions.length,
                rank: rank,
                result: passed ? "Đạt" : "Không đạt",
                answers: answers,
                createdAt: new Date().toISOString()
            });
        } catch (e) {
            console.error(e);
            alert("⚠️ Lỗi khi làm test!");
        }
    };

                <button onclick="window.updateProfile()" class="btn-create">Cập nhật</button>
            </div>
        `;
    }

    function loadProfile() {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user) return;
        const el = document.getElementById("profileName");
        if (el) el.value = user.name || "";
    }

    window.updateProfile = async function() {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user) return;
        const name = document.getElementById("profileName")?.value.trim();
        if (!name) return alert("⚠️ Họ và tên không được để trống!");
        try {
            await update(ref(db, 'users/' + user.username), { name });
            user.name = name;
            localStorage.setItem("currentUser", JSON.stringify(user));
            document.querySelector(".user-info .name").textContent = name;
            alert("✅ Cập nhật thành công!");
        } catch (e) { console.error(e); alert("⚠️ Lỗi khi cập nhật!"); }
    };

    // ============================================================
    // ĐĂNG XUẤT
    // ============================================================
    window.logout = function() {
        localStorage.removeItem("currentUser");
        window.location.href = "index.html";
    };

    // ============================================================
    // GAME - ĐÃ SỬA LỖI PHÍM SPACE
    // ============================================================
    let gameRunning = false, gameScore = 0, gameHighScore = parseInt(localStorage.getItem('doraemonHighScore')) || 0;
    let gameSpeed = 6, obstacles = [], frameId = null, isJumping = false, jumpVelocity = 0;
    const gravity = 0.6, playerX = 80, playerWidth = 40, playerHeight = 50, groundY = 300;
    let playerY = groundY - playerHeight;
    let currentGameTitle = 'Doraemon Run';
    let canvasReady = false;
    let isOnGamePage = false;

    function drawDoraemon(ctx, x, y, w, h) {
        ctx.fillStyle = '#2196F3';
        ctx.beginPath();
        ctx.arc(x + w/2, y + h/2 - 5, w/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(x + w/2, y + h/2 + 5, w/3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2196F3';
        ctx.beginPath();
        ctx.arc(x + w/2, y + 5, w/2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(x + w/2 - 5, y + 8, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + w/2 + 5, y + 8, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(x + w/2 - 7, y + 8, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + w/2 + 3, y + 8, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FF1744';
        ctx.beginPath();
        ctx.arc(x + w/2 - 2, y + 14, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(x + w/2 - 2, y + 18, 5, 0.1, Math.PI - 0.1);
        ctx.stroke();
        for (let i = -1; i <= 1; i += 2) {
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x + w/2 + i * 10, y + 10);
            ctx.lineTo(x + w/2 + i * 25, y + 5 + i * 5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + w/2 + i * 10, y + 14);
            ctx.lineTo(x + w/2 + i * 25, y + 14 + i * 5);
            ctx.stroke();
        }
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(x + w/2, y + h - 2, 6, 0, Math.PI * 2);
        ctx.fill();
    }

    function initGameCanvas() {
        if (!isOnGamePage) {
            console.log('⏳ Không ở trang Game, bỏ qua khởi tạo canvas.');
            return;
        }
        const canvas = document.getElementById('gameCanvas');
        if (!canvas) {
            console.log('⏳ Chưa có canvas, đợi vào trang Game...');
            return;
        }
        if (canvasReady) {
            console.log('✅ Canvas đã sẵn sàng, bỏ qua khởi tạo lại!');
            return;
        }
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 800, 350);
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, 800, 350);
        ctx.fillStyle = '#3d3d5c';
        ctx.fillRect(0, groundY, 800, 50);
        ctx.fillStyle = '#4d4d6c';
        ctx.fillRect(0, groundY, 800, 3);
        drawDoraemon(ctx, playerX, playerY, playerWidth, playerHeight);
        const highEl = document.getElementById('gameHighScore');
        if (highEl) highEl.textContent = gameHighScore;
        canvasReady = true;
        console.log('✅ Canvas đã sẵn sàng!');
    }

    window.startGame = function() {
        if (!isOnGamePage) {
            showToast('🎮 Vui lòng vào trang Game trước!', 'warning');
            return;
        }
        const canvas = document.getElementById('gameCanvas');
        if (!canvas) {
            showToast('⚠️ Không tìm thấy canvas!', 'error');
            return;
        }
        if (gameRunning) {
            console.log('⏳ Game đang chạy!');
            return;
        }
        canvasReady = false;
        initGameCanvas();
        
        gameRunning = true;
        gameScore = 0;
        obstacles = [];
        gameSpeed = 6;
        playerY = groundY - playerHeight;
        isJumping = false;
        jumpVelocity = 0;
        
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('gameScore');
        const startBtn = document.getElementById('gameStartBtn');
        if (startBtn) startBtn.textContent = '⏹️ Đang chơi...';

        function createObstacle() {
            const types = ['cactus', 'bird', 'rock'];
            const type = types[Math.floor(Math.random() * types.length)];
            const width = type === 'bird' ? 30 : type === 'cactus' ? 20 : 25;
            const height = type === 'bird' ? 25 : type === 'cactus' ? 35 : 20;
            const y = type === 'bird' ? groundY - 60 - Math.random() * 30 : groundY - height;
            obstacles.push({ x: 800, y, width, height, type, scored: false });
        }

        function drawObstacle(ctx, obs) {
            if (obs.type === 'cactus') {
                ctx.fillStyle = '#2E7D32';
                ctx.fillRect(obs.x + 5, obs.y + 10, 10, obs.height - 10);
                ctx.fillRect(obs.x - 5, obs.y + 15, 8, 15);
                ctx.fillRect(obs.x + 12, obs.y + 15, 8, 12);
            } else if (obs.type === 'bird') {
                ctx.fillStyle = '#FF6F00';
                ctx.beginPath();
                ctx.arc(obs.x + obs.width/2, obs.y + obs.height/2, obs.width/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#E65100';
                ctx.fillRect(obs.x + 2, obs.y - 5, 10, 6);
                ctx.fillRect(obs.x + 15, obs.y - 5, 10, 6);
            } else {
                ctx.fillStyle = '#78909C';
                ctx.beginPath();
                ctx.ellipse(obs.x + obs.width/2, obs.y + obs.height/2, obs.width/2, obs.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function gameLoop() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, 800, 350);
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, 800, 350);
            ctx.fillStyle = '#2d2d44';
            ctx.fillRect(0, groundY, 800, 50);
            ctx.fillStyle = '#3d3d5c';
            for (let i = 0; i < 800; i += 40) {
                const offset = (Date.now() / 100 * gameSpeed / 6) % 40;
                ctx.fillRect(i - offset, groundY, 20, 3);
            }
            drawDoraemon(ctx, playerX, playerY, playerWidth, playerHeight);
            if (isJumping) {
                playerY += jumpVelocity;
                jumpVelocity += gravity;
                if (playerY >= groundY - playerHeight) {
                    playerY = groundY - playerHeight;
                    isJumping = false;
                    jumpVelocity = 0;
                }
            }
            if (Math.random() < 0.02 + gameSpeed / 400) createObstacle();
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= gameSpeed;
                if (!obs.scored && obs.x + obs.width < playerX) {
                    obs.scored = true;
                    gameScore += 10;
                    if (scoreEl) scoreEl.textContent = gameScore;
                }
                if (obs.x < playerX + playerWidth - 10 && obs.x + obs.width > playerX + 10 &&
                    obs.y < playerY + playerHeight - 5 && obs.y + obs.height > playerY + 5) {
                    gameRunning = false;
                    if (startBtn) startBtn.textContent = '▶️ Bắt đầu';
                    if (gameScore > gameHighScore) {
                        gameHighScore = gameScore;
                        localStorage.setItem('doraemonHighScore', gameHighScore);
                        document.getElementById('gameHighScore').textContent = gameHighScore;
                        saveScore(gameScore);
                        alert('🎉 KỶ LỤC MỚI! ' + gameScore + ' điểm!');
                    } else {
                        alert('💀 Game Over! Điểm: ' + gameScore);
                    }
                    obstacles = [];
                    return;
                }
                if (obs.x + obs.width < -50) obstacles.splice(i, 1);
                drawObstacle(ctx, obs);
            }
            if (gameSpeed < 15) gameSpeed += 0.002;
            if (scoreEl) scoreEl.textContent = gameScore;
            frameId = requestAnimationFrame(gameLoop);
        }
        gameLoop();
    };

    window.jumpGame = function() {
        if (!gameRunning || isJumping) return;
        isJumping = true;
        jumpVelocity = -12;
    };

    window.resetGame = function() {
        gameRunning = false;
        if (frameId) { cancelAnimationFrame(frameId); frameId = null; }
        obstacles = [];
        gameScore = 0;
        gameSpeed = 6;
        playerY = groundY - playerHeight;
        isJumping = false;
        jumpVelocity = 0;
        document.getElementById('gameScore').textContent = '0';
        const startBtn = document.getElementById('gameStartBtn');
        if (startBtn) startBtn.textContent = '▶️ Bắt đầu';
        const canvas = document.getElementById('gameCanvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 800, 350);
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, 800, 350);
            ctx.fillStyle = '#3d3d5c';
            ctx.fillRect(0, groundY, 800, 50);
            ctx.fillStyle = '#4d4d6c';
            ctx.fillRect(0, groundY, 800, 3);
            drawDoraemon(ctx, playerX, playerY, playerWidth, playerHeight);
        }
        canvasReady = false;
        showToast('🔄 Đã reset game!', 'info');
    };

    window.exitGame = function() {
        gameRunning = false;
        if (frameId) { cancelAnimationFrame(frameId); frameId = null; }
        isOnGamePage = false;
        window.showPage('games');
    };

    async function saveScore(score) {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) return;
        const title = document.getElementById('currentGameTitle')?.textContent || 'Doraemon Run';
        try {
            await push(ref(db, "gameScores"), {
                gameTitle: title,
                username: user.username,
                userName: user.name || user.username,
                score,
                createdAt: new Date().toISOString()
            });
            loadScores();
        } catch (e) { console.error('Lỗi lưu điểm:', e); }
    }

    function loadScores() {
        const tbody = document.getElementById('scoreTableBody');
        if (!tbody) return;
        onValue(ref(db, "gameScores"), snapshot => {
            tbody.innerHTML = '';
            if (!snapshot.exists()) {
                tbody.innerHTML = '<tr><td colspan="5">Chưa có điểm nào</td></tr>';
                return;
            }
            const scores = [];
            snapshot.forEach(child => scores.push(child.val()));
            scores.sort((a, b) => (b.score || 0) - (a.score || 0));
            scores.slice(0, 20).forEach((s, idx) => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>#${idx + 1}</strong></td>
                        <td>${s.userName || s.username || 'Unknown'}</td>
                        <td><strong>${s.score || 0}</strong></td>
                        <td>${s.gameTitle || 'Doraemon Run'}</td>
                        <td>${s.createdAt ? new Date(s.createdAt).toLocaleDateString() : 'N/A'}</td>
                    </tr>
                `;
            });
        });
    }

    function getGamesPage(user) {
        console.log("🎮 Đang tạo trang Games...");
        isOnGamePage = true;
        const canManage = user.role === "Ban Quản Trị";
        let html = `<h2>🎮 Game nội bộ</h2>`;
        html += `
            <div style="background:#1a1a2e; border-radius:12px; padding:20px; margin-bottom:20px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
                    <h3 style="color:#fff; margin:0;">🎮 <span id="currentGameTitle">${currentGameTitle}</span></h3>
                    <button onclick="window.exitGame()" class="btn-delete" style="background:#ef4444;">❌ Thoát game</button>
                </div>
                <canvas id="gameCanvas" width="800" height="350" style="width:100%; max-width:800px; height:auto; border-radius:8px; background:#1a1a2e; display:block; margin:0 auto; cursor:pointer;"></canvas>
                <div style="display:flex; justify-content:space-between; color:#fff; margin-top:10px; font-size:16px; flex-wrap:wrap; gap:10px;">
                    <span>🏆 Điểm: <strong id="gameScore">0</strong></span>
                    <span>🥇 Cao nhất: <strong id="gameHighScore">${gameHighScore}</strong></span>
                </div>
                <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
                    <button onclick="window.startGame()" class="btn-create" style="background:#10b981;" id="gameStartBtn">▶️ Bắt đầu</button>
                    <button onclick="window.jumpGame()" class="btn-create" style="background:#f59e0b;">⬆️ Nhảy (Space)</button>
                    <button onclick="window.resetGame()" class="btn-delete" style="background:#64748b;">🔄 Chơi lại</button>
                </div>
                <p style="color:#94a3b8; font-size:12px; margin-top:8px;">
                    ⌨️ <strong>Phím Space</strong> để Bắt đầu / Nhảy | Click chuột vào màn hình để nhảy
                </p>
            </div>
        `;
        if (canManage) {
            html += `
                <div class="account-form-box">
                    <h3>🎯 Tạo game mới</h3>
                    <div style="display:flex; flex-direction:column; gap:12px;">
                        <input type="text" id="gameTitle" placeholder="Tên game" value="Doraemon Run" />
                        <textarea id="gameDesc" placeholder="Mô tả..." style="min-height:60px;">Chạy cùng Doraemon, tránh chướng ngại vật!</textarea>
                        <button onclick="window.addGame()" class="btn-create" style="align-self:flex-start;">🎮 Tạo game & Chơi</button>
                    </div>
                </div>
            `;
        } else {
            html += `<p style="color:#94a3b8; margin-bottom:16px;">🔒 Chỉ Ban Quản Trị mới tạo được game.</p>`;
        }
        html += `
            <div class="table-container">
                <table class="table">
                    <thead><tr><th>Tên game</th><th>Mô tả</th><th>Điểm cao nhất</th><th>Người giữ kỷ lục</th><th>Thao tác</th></tr></thead>
                    <tbody id="gameTableBody"><tr><td colspan="5">Đang tải...</td></tr></tbody>
                </table>
            </div>
            <div style="margin-top:24px;">
                <h3>🏆 Bảng xếp hạng game</h3>
                <div class="table-container">
                    <table class="table">
                        <thead><tr><th>#</th><th>Người chơi</th><th>Điểm</th><th>Game</th><th>Ngày</th></tr></thead>
                        <tbody id="scoreTableBody"><tr><td colspan="5">Đang tải...</td></tr></tbody>
                    </table>
                </div>
            </div>
        `;
        return html;
    }

    window.addGame = async function() {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user || user.role !== "Ban Quản Trị") return alert("⛔ Chỉ Ban Quản Trị mới có quyền tạo game!");
        const title = document.getElementById("gameTitle")?.value.trim() || 'Doraemon Run';
        const desc = document.getElementById("gameDesc")?.value.trim() || 'Chạy cùng Doraemon!';
        try {
            await push(ref(db, "games"), {
                title, desc,
                type: 'Doraemon Run',
                createdBy: user.username,
                createdAt: new Date().toISOString()
            });
            alert("✅ Tạo game thành công!");
            window.showPage('games');
        } catch (e) { console.error(e); alert("⚠️ Lỗi khi tạo game!"); }
    };

    window.playGame = async function(key) {
        try {
            const snap = await get(ref(db, 'games/' + key));
            if (!snap.exists()) return alert("Game không tồn tại!");
            const game = snap.val();
            currentGameTitle = game.title || 'Doraemon Run';
            document.getElementById('currentGameTitle').textContent = currentGameTitle;
            window.showPage('games');
            setTimeout(initGameCanvas, 300);
        } catch (e) { console.error(e); alert("⚠️ Lỗi khi chơi game!"); }
    };

    window.deleteGame = async function(key) {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user || user.role !== "Ban Quản Trị") return alert("⛔ Chỉ Ban Quản Trị mới có quyền xóa game!");
        if (!confirm("Xóa game này?")) return;
        try { await remove(ref(db, 'games/' + key)); alert("✅ Đã xóa game!"); } catch (e) { console.error(e); alert("⚠️ Lỗi khi xóa game!"); }
    };

    function loadGames() {
        const tbody = document.getElementById("gameTableBody");
        if (!tbody) return;
        const user = JSON.parse(localStorage.getItem('currentUser'));
        const isAdmin = user?.role === "Admin";
        const isBQT = user?.role === "Ban Quản Trị";

        onValue(ref(db, "games"), snapshot => {
            tbody.innerHTML = "";
            if (!snapshot.exists()) {
                tbody.innerHTML = '<tr><td colspan="5">Chưa có game nào</td></tr>';
                return;
            }
            snapshot.forEach(child => {
                const game = child.val();
                const key = child.key;
                let actions = "";
                if (isAdmin) actions = '<span class="badge-default">Chỉ xem</span>';
                else if (isBQT) actions = `
                    <button onclick="window.playGame('${key}')" class="btn-create" style="background:#10b981;">🎮 Chơi</button>
                    <button onclick="window.deleteGame('${key}')" class="btn-delete">🗑️ Xóa</button>
                `;
                else actions = `<button onclick="window.playGame('${key}')" class="btn-create" style="background:#10b981;">🎮 Chơi</button>`;
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${game.title || "N/A"}</strong></td>
                        <td>${game.desc || ""}</td>
                        <td><span id="highScore_${key}">...</span></td>
                        <td><span id="highScorePlayer_${key}">...</span></td>
                        <td>${actions}</td>
                    </tr>
                `;
                loadGameHighScore(key);
            });
        });
    }

    function loadGameHighScore(gameKey) {
        get(ref(db, "gameScores")).then(snapshot => {
            if (!snapshot.exists()) return;
            const scores = [];
            snapshot.forEach(child => {
                const data = child.val();
                if (data.gameTitle === gameKey || data.gameId === gameKey) scores.push(data);
            });
            scores.sort((a, b) => (b.score || 0) - (a.score || 0));
            const el = document.getElementById('highScore_' + gameKey);
            const elPlayer = document.getElementById('highScorePlayer_' + gameKey);
            if (scores.length > 0) {
                if (el) el.textContent = scores[0].score || 0;
                if (elPlayer) elPlayer.textContent = scores[0].userName || scores[0].username || 'Unknown';
            } else {
                if (el) el.textContent = '0';
                if (elPlayer) elPlayer.textContent = '-';
            }
        }).catch(() => {});
    }

    // ============================================================
    // ĐIỀU KHIỂN PHÍM SPACE - KHÔNG ẢNH HƯỞNG SOẠN VĂN BẢN
    // ============================================================
    document.addEventListener('keydown', function(e) {
        // Bỏ qua nếu đang ở ô nhập liệu (input, textarea, select)
        const tag = e.target.tagName.toLowerCase();
        if (tag === 'input' || tag === 'textarea' || tag === 'select') {
            return;
        }

        if (e.key === ' ' || e.key === 'Space') {
            e.preventDefault();
            if (isOnGamePage) {
                if (!gameRunning) window.startGame();
                else window.jumpGame();
            }
        }
    });

    document.addEventListener('click', function(e) {
        if (e.target.id === 'gameCanvas' && isOnGamePage) {
            if (!gameRunning) window.startGame();
            else window.jumpGame();
        }
    });

    console.log("✅ Dashboard đã tải thành công!");
    console.log("📝 BQT đã có nút Sửa văn bản!");
    console.log("🎮 Lỗi phím Space đã được sửa!");
</script>

</body>
</html>

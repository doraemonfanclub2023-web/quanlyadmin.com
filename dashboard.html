<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Doraemon Fanclub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <h2>DORAEMON FANCLUB ADMIN</h2>
        <div class="user-box">
            Xin chào, <span id="userName">Đang tải...</span>
        </div>
    </header>

    <div class="container">
        <!-- SIDEBAR TRÁI (DUY NHẤT VÀ CHUẨN SỰ KIỆN CLICK) -->
        <aside class="sidebar">
            <ul>
                <li><a href="javascript:void(0);" onclick="showPage('home')">Trang chủ</a></li>
                <li><a href="javascript:void(0);" onclick="showPage('members')">Quản lý thành viên</a></li>
                <li><a href="javascript:void(0);" onclick="showPage('game')">Quản lý Mini Game</a></li>
                <li><a href="javascript:void(0);" onclick="showPage('notice')">Quản lý thông báo</a></li>
                <li><a href="javascript:void(0);" onclick="showPage('setting')">Cài đặt hệ thống</a></li>
                <li><a href="javascript:void(0);" class="logout" onclick="logout()">Đăng xuất</a></li>
            </ul>
        </aside>

        <!-- NỘI DUNG CHÍNH (NƠI HIỂN THỊ ĐỘNG CÁC TRANG) -->
        <main class="content">
            <div id="pageContent">
                <!-- Khi mới load trang, JavaScript sẽ tự động đổ giao diện 'home' vào đây -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

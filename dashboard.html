<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Doraemon Fanclub Admin</title>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="brand">
                <h3>DORAEMON FANCLUB<br>VIỆT NAM ADMIN</h3>
            </div>
            <ul>
                <li onclick="showPage('home')">🏠 Trang chủ</li>
                <li onclick="showPage('members')">👥 Quản lý thành viên</li>
                <li onclick="showPage('notice')">📢 Quản lý thông báo</li>
                <li onclick="showPage('minigame')">🎁 Mini Game</li>
                <li onclick="showPage('documents')">📄 Quản lý Công văn</li>
                <li onclick="showPage('setting')">⚙️ Cài đặt hệ thống</li>
                <li onclick="showPage('account')">👤 Thông tin cá nhân</li>
            </ul>
            <div class="logout-btn" onclick="logout()">Đăng xuất</div>
        </nav>

        <!-- Nội dung chính -->
        <main class="content">
            <div class="footer-note">Hệ thống Quản trị Đám mây 🌐</div>
            <div id="pageContent">
                <!-- Nội dung sẽ được render tại đây bởi script của bồ -->
            </div>
        </main>
    </div>

    <!-- THÊM DÒNG NÀY VÀO ĐÂY BỒ NHÉ -->
    <script src="script.js"></script>
</body>
</html>

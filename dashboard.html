<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dora Admin 2.0</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="dashboard">

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar">
            <div class="brand">
                <img src="https://i.postimg.cc/Z57X57Gp/Chua-co-ten-(Logo)-(1).png" alt="Logo" />
                <h3>DORA ADMIN</h3>
                <span>Hệ thống quản trị</span>
            </div>

            <nav>
                <a href="#" data-page="home" class="active">🏠 Trang chủ</a>
                <a href="#" data-page="users">👥 Thành viên</a>
                <a href="#" data-page="notices">📢 Thông báo</a>
                <a href="#" data-page="documents">📄 Văn bản</a>
                <a href="#" data-page="tests">📝 Test kỹ năng</a>
                <a href="#" data-page="games">🎮 Game</a>
                <a href="#" data-page="settings">⚙️ Cài đặt</a>
                <a href="#" data-page="profile">👤 Hồ sơ</a>
            </nav>

            <div class="user-info">
                <div class="name">Đang tải...</div>
                <div class="role">...</div>
                <button onclick="window.logout()">🚪 Đăng xuất</button>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="main-content">
            <div class="page-header">
                <h2 id="pageTitle">Trang chủ</h2>
            </div>
            <div id="pageContent">
                <!-- Nội dung sẽ được render bởi JavaScript -->
            </div>
        </main>

    </div>

    <!-- ===== FIREBASE ===== -->
    <script type="module" src="js/firebase.js"></script>

    <!-- ===== TOÀN BỘ CODE DASHBOARD ===== -->
    <script type="module">
        import { db, ref, get, set, update, remove, push, onValue } from "./js/firebase.js";

        // ===== KIỂM TRA ĐĂNG NHẬP =====
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem("currentUser"));
            if (!user) {
                window.location.href = "index.html";
                return null;
            }
            return user;
        }

        // ===== GẮN SỰ KIỆN CHO MENU =====
        document.addEventListener("DOMContentLoaded", function() {
            const user = checkAuth();
            if (!user) return;

            const nameEl = document.querySelector(".user-info .name");
            const roleEl = document.querySelector(".user-info .role");
            if (nameEl) nameEl.textContent = user.name || user.username;
            if (roleEl) roleEl.textContent = user.role || "Admin";

            document.querySelectorAll(".sidebar nav a").forEach(function(link) {
                link.addEventListener("click", function(e) {
                    e.preventDefault();
                    const page = this.dataset.page;
                    if (page) window.showPage(page);
                });
            });

            window.showPage("home");
        });

        // ===== HIỂN THỊ TRANG =====
        window.showPage = function(pageId) {
            const user = checkAuth();
            if (!user) return;

            if (pageId === "settings" && user.role !== "Ban Quản Trị") {
                alert("⛔ Bạn không có quyền truy cập Cài đặt!");
                return;
            }

            document.querySelectorAll(".sidebar nav a").forEach(function(el) {
                el.classList.remove("active");
            });

            const menuItem = document.querySelector('.sidebar nav a[data-page="' + pageId + '"]');
            if (menuItem) menuItem.classList.add("active");

            var titles = {
                home: "🏠 Trang chủ",
                users: "👥 Quản lý thành viên",
                notices: "📢 Quản lý thông báo",
                documents: "📄 Quản lý văn bản",
                tests: "📝 Quản lý test kỹ năng",
                games: "🎮 Game nội bộ",
                settings: "⚙️ Cài đặt hệ thống",
                profile: "👤 Hồ sơ cá nhân"
            };
            document.getElementById("pageTitle").textContent = titles[pageId] || "Trang";

            var content = document.getElementById("pageContent");
            if (!content) return;

            var pages = {
                home: getHomePage(),
                users: getUsersPage(user),
                notices: getNoticesPage(user),
                documents: getDocumentsPage(user),
                tests: getTestsPage(user),
                games: getGamesPage(user),
                settings: getSettingsPage(user),
                profile: getProfilePage(user)
            };

            content.innerHTML = pages[pageId] || "<h2>Trang đang phát triển</h2>";

            if (pageId === "home") loadHomeData();
            if (pageId === "users") loadUsers();
            if (pageId === "notices") loadNotices();
            if (pageId === "documents") loadDocuments();
            if (pageId === "tests") loadTests();
            if (pageId === "games") {
                setTimeout(function() {
                    loadGames();
                    loadScores();
                    initGameCanvas();
                }, 100);
            }
            if (pageId === "settings") loadSettings();
            if (pageId === "profile") loadProfile();
        };

        // ==========================================
        // TRANG CHỦ
        // ==========================================
        function getHomePage() {
            return `
                <div class="cards">
                    <div class="card" onclick="window.showPage('users')" style="cursor:pointer;">
                        <h3>👥 Thành viên</h3>
                        <h1 id="totalUsers">...</h1>
                    </div>
                    <div class="card" onclick="window.showPage('notices')" style="cursor:pointer;">
                        <h3>📢 Thông báo</h3>
                        <h1 id="totalNotices">...</h1>
                    </div>
                    <div class="card" onclick="window.showPage('documents')" style="cursor:pointer;">
                        <h3>📄 Văn bản</h3>
                        <h1 id="totalDocs">...</h1>
                    </div>
                    <div class="card" onclick="window.showPage('tests')" style="cursor:pointer;">
                        <h3>📝 Bài test</h3>
                        <h1 id="totalTests">...</h1>
                    </div>
                </div>
                <div class="account-form-box">
                    <h3>📋 Hoạt động gần đây</h3>
                    <div id="recentActivities">🟢 Hệ thống đang hoạt động bình thường</div>
                </div>
            `;
        }

        function loadHomeData() {
            onValue(ref(db, "users"), function(snapshot) {
                var el = document.getElementById("totalUsers");
                if (el) el.textContent = snapshot.exists() ? Object.keys(snapshot.val()).length : "0";
            });
            onValue(ref(db, "notices"), function(snapshot) {
                var el = document.getElementById("totalNotices");
                if (el) el.textContent = snapshot.exists() ? Object.keys(snapshot.val()).length : "0";
            });
            onValue(ref(db, "documents"), function(snapshot) {
                var el = document.getElementById("totalDocs");
                if (el) el.textContent = snapshot.exists() ? Object.keys(snapshot.val()).length : "0";
            });
            onValue(ref(db, "tests"), function(snapshot) {
                var el = document.getElementById("totalTests");
                if (el) el.textContent = snapshot.exists() ? Object.keys(snapshot.val()).length : "0";
            });
        }

        // ==========================================
        // QUẢN LÝ THÀNH VIÊN
        // ==========================================
        function getUsersPage(user) {
            var canManage = user.role !== "Admin";
            var html = '<h2>👥 Quản lý thành viên</h2>';

            if (canManage) {
                html += `
                    <div class="account-form-box">
                        <h3>➕ Thêm tài khoản mới</h3>
                        <div class="inline-form">
                            <input type="text" id="newUsername" placeholder="Mã tài khoản" />
                            <input type="text" id="newName" placeholder="Họ và tên" />
                            <input type="password" id="newPassword" placeholder="Mật khẩu" />
                            <select id="newRole">
                                <option value="Admin">Admin</option>
                                <option value="Ban Quản Trị">Ban Quản Trị</option>
                            </select>
                            <button onclick="window.addAccount()" class="btn-create">Tạo</button>
                        </div>
                    </div>
                `;
            } else {
                html += '<p style="color:#94a3b8; margin-bottom:16px;">🔒 Bạn ở chế độ chỉ xem.</p>';
            }

            html += `
                <div class="table-container">
                    <table class="table">
                        <thead><tr><th>Mã</th><th>Tên</th><th>Chức vụ</th><th>Thao tác</th></tr></thead>
                        <tbody id="userTableBody"><tr><td colspan="4">Đang tải...</td></tr></tbody>
                    </table>
                </div>
            `;

            return html;
        }

        function loadUsers() {
            var tbody = document.getElementById("userTableBody");
            if (!tbody) return;
            var currentUser = JSON.parse(localStorage.getItem("currentUser"));
            var isAdmin = currentUser && currentUser.role === "Admin";

            onValue(ref(db, "users"), function(snapshot) {
                tbody.innerHTML = "";
                if (!snapshot.exists()) {
                    tbody.innerHTML = '<tr><td colspan="4">Chưa có tài khoản</td></tr>';
                    return;
                }
                snapshot.forEach(function(childSnapshot) {
                    var u = childSnapshot.val();
                    var key = childSnapshot.key;
                    var actions = "";

                    if (isAdmin) {
                        actions = '<span class="badge-default">Chỉ xem</span>';
                    } else if (u.username === "BQT001" || u.username === "BQT002") {
                        actions = '<span style="color:#94a3b8;">Hệ thống</span>';
                    } else {
                        actions = `
                            <button onclick="window.changePassword('${key}')" class="btn-edit">Đổi MK</button>
                            <button onclick="window.deleteAccount('${key}')" class="btn-delete">Xóa</button>
                        `;
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${u.username}</strong></td>
                            <td>${u.name || u.username}</td>
                            <td>${u.role || "Admin"}</td>
                            <td>${actions}</td>
                        </tr>
                    `;
                });
            });
        }

        window.addAccount = async function() {
            var currentUser = JSON.parse(localStorage.getItem("currentUser"));
            if (!currentUser || currentUser.role === "Admin") {
                alert("⛔ Bạn không có quyền thêm tài khoản!");
                return;
            }
            var username = document.getElementById("newUsername")?.value.trim();
            var name = document.getElementById("newName")?.value.trim();
            var password = document.getElementById("newPassword")?.value.trim();
            var role = document.getElementById("newRole")?.value;

            if (!username || !password) {
                alert("⚠️ Vui lòng nhập Mã và Mật khẩu!");
                return;
            }

            try {
                var check = await get(ref(db, 'users/' + username));
                if (check.exists()) {
                    alert("❌ Mã tài khoản đã tồn tại!");
                    return;
                }
                await set(ref(db, 'users/' + username), {
                    username: username,
                    name: name || username,
                    password: password,
                    role: role || "Admin"
                });
                alert("✅ Tạo tài khoản thành công!");
                document.getElementById("newUsername").value = "";
                document.getElementById("newName").value = "";
                document.getElementById("newPassword").value = "";
            } catch (err) {
                console.error(err);
                alert("⚠️ Lỗi khi tạo tài khoản!");
            }
        };

        window.deleteAccount = async function(username) {
            var currentUser = JSON.parse(localStorage.getItem("currentUser"));
            if (!currentUser || currentUser.role === "Admin") {
                alert("⛔ Bạn không có quyền xóa!");
                return;
            }
            if (username === "BQT001" || username === "BQT002") {
                alert("⛔ Không thể xóa tài khoản hệ thống!");
                return;
            }
            if (!confirm('Xóa tài khoản "' + username + '"?')) return;

            try {
                await remove(ref(db, 'users/' + username));
                alert("✅ Đã xóa thành công!");
            } catch (err) {
                console.error(err);
                alert("⚠️ Lỗi khi xóa!");
            }
        };

        window.changePassword = async function(username) {
            var currentUser = JSON.parse(localStorage.getItem("currentUser"));
            if (!currentUser || currentUser.role === "Admin") {
                alert("⛔ Bạn không có quyền đổi mật khẩu!");
                return;
            }
            var newPass = prompt('Nhập mật khẩu mới cho "' + username + '":');
            if (newPass === null) return;
            var cleanPass = newPass.trim();
            if (!cleanPass) {
                alert("⚠️ Mật khẩu không được để trống!");
                return;
            }

            try {
                await update(ref(db, 'users/' + username), { password: cleanPass });
                alert("✅ Đổi mật khẩu thành công!");
            } catch (err) {
                console.error(err);
                alert("⚠️ Lỗi khi đổi mật khẩu!");
            }
        };

        // ==========================================
        // QUẢN LÝ THÔNG BÁO
        // ==========================================
        function getNoticesPage(user) {
            var canManage = user.role !== "Admin";
            var html = '<h2>📢 Quản lý thông báo</h2>';

            if (canManage) {
                html += `
                    <div class="account-form-box">
                        <h3>📝 Đăng thông báo mới</h3>
                        <div class="inline-form" style="flex-direction:column; align-items:stretch;">
                            <input type="text" id="noticeTitle" placeholder="Tiêu đề..." />
                            <textarea id="noticeContent" placeholder="Nội dung..."></textarea>
                            <button onclick="window.addNotice()" class="btn-create" style="align-self:flex-start;">Đăng</button>
                        </div>
                    </div>
                `;
            } else {
                html += '<p style="color:#94a3b8; margin-bottom:16px;">🔒 Chế độ chỉ xem.</p>';
            }

            html += `
                <div class="table-container">
                    <table class="table">
                        <thead><tr><th>Ngày</th><th>Tiêu đề</th><th>Nội dung</th><th>Thao tác</th></tr></thead>
                        <tbody id="noticeTableBody"><tr><td colspan="4">Đang tải...</td></tr></tbody>
                    </table>
                </div>
            `;

            return html;
        }

        function loadNotices() {
            var tbody = document.getElementById("noticeTableBody");
            if (!tbody) return;
            var currentUser = JSON.parse(localStorage.getItem("currentUser"));
            var isAdmin = currentUser && currentUser.role === "Admin";

            onValue(ref(db, "notices"), function(snapshot) {
                tbody.innerHTML = "";
                if (!snapshot.exists()) {
                    tbody.innerHTML = '<tr><td colspan="4">Chưa có thông báo</td></tr>';
                    return;
                }
                var notices = [];
                snapshot.forEach(function(child) {
                    var data = child.val();
                    data.key = child.key;
                    notices.push(data);
                });
                notices.reverse();

                notices.forEach(function(n) {
                    var actions = isAdmin ?
                        '<span class="badge-default">Chỉ xem</span>' :
                        '<button onclick="window.deleteNotice(\'' + n.key + '\')" class="btn-delete">Xóa</button>';

                    tbody.innerHTML += `
                        <tr>
                            <td>${n.date || "N/A"}</td>
                            <td><strong>${n.title}</strong></td>
                            <td>${n.content || ""}</td>
                            <td>${actions}</td>
                        </tr>
                    `;
                });
            });
        }

        window.addNotice = async function() {
            var currentUser = JSON.parse(localStorage.getItem("currentUser"));
            if (!currentUser || currentUser.role === "Admin") {
                alert("⛔ Bạn không có quyền đăng thông báo!");
                return;
            }
            var title = document.getElementById("noticeTitle")?.value.trim();
            var content = document.getElementById("noticeContent")?.value.trim();

            if (!title || !content) {
                alert("⚠️ Vui lòng nhập tiêu đề và nội dung!");
                return;
            }

            try {
                var today = new Date();
                var dateStr = String(today.getDate()).padStart(2, "0") + "/" + String(today.getMonth() + 1).padStart(2, "0") + "/" + today.getFullYear();

                await push(ref(db, "notices"), {
                    title: title,
                    content: content,
                    date: dateStr,
                    author: currentUser.name || currentUser.username
                });

                alert("✅ Đăng thông báo thành công!");
                document.getElementById("noticeTitle").value = "";
                document.getElementById("noticeContent").value = "";
            } catch (err) {
                console.error(err);
                alert("⚠️ Lỗi khi đăng thông báo!");
            }
        };

        window.deleteNotice = async function(key) {
            var currentUser = JSON.parse(localStorage.getItem("currentUser"));
            if (!currentUser || currentUser.role === "Admin") {
                alert("⛔ Bạn không có quyền xóa!");
                return;
            }
            if (!confirm("Xóa thông báo này?")) return;

            try {
                await remove(ref(db, 'notices/' + key));
                alert("✅ Đã xóa!");
            } catch (err) {
                console.error(err);
                alert("⚠️ Lỗi khi xóa!");
            }
        };

        // ==========================================
        // QUẢN LÝ VĂN BẢN
        // ==========================================
        function getDocumentsPage(user) {
            var canManage = user.role !== "Admin";
            var html = '<h2>📄 Quản lý văn bản hành chính</h2>';

            if (canManage) {
                html += `
                    <div class="account-form-box">
                        <h3>📝 Thêm văn bản mới</h3>
                        <div style="display:flex; flex-direction:column; gap:12px;">
                            <div style="display:flex; gap:12px; flex-wrap:wrap;">
                                <input type="text" id="docSoVanBan" placeholder="Số văn bản (VD: 06/QĐ-BQT)" style="flex:1;" />
                                <select id="docLoai" style="flex:1;">
                                    <option value="Quyết định">📄 Quyết định</option>
                                    <option value="Công văn">📨 Công văn</option>
                                    <option value="Nghị quyết">📋 Nghị quyết</option>
                                    <option value="Biên bản">📑 Biên bản</option>
                                    <option value="Quy chế">⚖️ Quy chế</option>
                                </select>
                            </div>
                            <input type="text" id="docTieuDe" placeholder="Tiêu đề văn bản..." />
                            <textarea id="docNoiDung" placeholder="Nội dung văn bản..." style="min-height:100px;"></textarea>
                            <div style="display:flex; gap:12px; flex-wrap:wrap;">
                                <input type="text" id="docNguoiKy" placeholder="Người ký..." style="flex:1;" />
                                <input type="date" id="docNgayBanHanh" style="flex:1;" />
                            </div>
                            <button onclick="window.addDocument()" class="btn-create" style="align-self:flex-start;">📤 Đăng văn bản</button>
                        </div>
                    </div>
                `;
            } else {
                html += '<p style="color:#94a3b8; margin-bottom:16px;">🔒 Chế độ chỉ xem văn bản.</p>';
            }

            html += `
                <div style="margin-bottom:16px; display:flex; gap:12px; flex-wrap:wrap;">
                    <input type="text" id="docSearch" placeholder="🔍 Tìm kiếm theo số, tiêu đề..." style="padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; flex:1; min-width:200px;" />
                    <select id="docFilterType" style="padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px;">
                        <option value="all">📋 Tất cả loại</option>
                        <option value="Quyết định">📄 Quyết định</option>
                        <option value="Công văn">📨 Công văn</option>
                        <option value="Nghị quyết">📋 Nghị quyết</option>
                        <option value="Biên bản">📑 Biên bản</option>
                        <option value="Quy chế">⚖️ Quy chế</option>
                    </select>
                    <button onclick="window.searchDocuments()" class="btn-create">Tìm kiếm</button>
                </div>

                <div class="table-container">
                    <table class="table">
                        <thead><tr><th>Số văn bản</th><th>Loại</th><th>Tiêu đề</th><th>Ngày ban hành</th><th>Người ký</th><th>Thao tác</th></tr></thead>
                        <tbody id="docTableBody"><tr><td colspan="6">Đang tải...</td></tr></tbody>
                    </table>
                </div>
            `;

            return html;
        }

        function loadDocuments() {
            var tbody = document.getElementById("docTableBody");
            if (!tbody) return;
            var currentUser = JSON.parse(localStorage.getItem("currentUser"));
            var isAdmin = currentUser && currentUser.role === "Admin";

            onValue(ref(db, "documents"), function(snapshot) {
                tbody.innerHTML = "";
                if (!snapshot.exists()) {
                    tbody.innerHTML = '<tr><td colspan="6">Chưa có văn bản nào</td></tr>';
                    return;
                }
                var docs = [];
                snapshot.forEach(function(child) {
                    var data = child.val();
                    data.key = child.key;
                    docs.push(data);
                });
                docs.reverse();

                docs.forEach(function(doc) {
                    var actions = isAdmin ?
                        '<span class="badge-default">Chỉ xem</span>' :
                        '<button onclick="window.deleteDocument(\'' + doc.key + '\')" class="btn-delete">Xóa</button>';

                    var loaiColors = {
                        "Quyết định": "#3b82f6",
                        "Công văn": "#10b981",
                        "Nghị quyết": "#f59e0b",
                        "Biên bản": "#8b5cf6",
                        "Quy chế": "#ef4444"
                    };
                    var color = loaiColors[doc.loai] || "#64748b";

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${doc.soVanBan || "N/A"}</strong></td>
                            <td><span style="background:${color}; color:white; padding:2px 10px; border-radius:12px; font-size:12px;">${doc.loai || "Khác"}</span></td>
                            <td>${doc.tieuDe || ""}</td>
                            <td>${doc.ngayBanHanh || "N/A"}</td>
                            <td>${doc.nguoiKy || "N/A"}</td>
                            <td>${actions}</td>
                        </tr>
                    `;
                });
            });
        }

        window.addDocument = async function() {
            var currentUser = JSON.parse(localStorage.getItem("currentUser"));
            if (!currentUser || currentUser.role === "Admin") {
                alert("⛔ Bạn không có quyền thêm văn bản!");
                return;
            }
            var soVanBan = document.getElementById("docSoVanBan")?.value.trim();
            var loai = document.getElementById("docLoai")?.value;
            var tieuDe = document.getElementById("docTieuDe")?.value.trim();
            var noiDung = document.getElementById("docNoiDung")?.value.trim();
            var nguoiKy = document.getElementById("docNguoiKy")?.value.trim();
            var ngayBanHanh = document.getElementById("docNgayBanHanh")?.value;

            if (!soVanBan || !tieuDe || !noiDung) {
                alert("⚠️ Vui lòng nhập Số văn bản, Tiêu đề và Nội dung!");
                return;
            }

            try {
                await push(ref(db, "documents"), {
                    soVanBan: soVanBan,
                    loai: loai || "Khác",
                    tieuDe: tieuDe,
                    noiDung: noiDung,
                    nguoiKy: nguoiKy || currentUser.name || currentUser.username,
                    ngayBanHanh: ngayBanHanh || new Date().toISOString().split("T")[0],
                    trangThai: "Hiệu lực",
                    createdAt: new Date().toISOString()
                });

                alert("✅ Đăng văn bản thành công!");
                document.getElementById("docSoVanBan").value = "";
                document.getElementById("docTieuDe").value = "";
                document.getElementById("docNoiDung").value = "";

        window.parseQuestions = function(text) {
            var lines = text.split('\n');
            var questions = [];
            var currentQuestion = null;
            var currentOptions = [];
            
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (!line) continue;
                
                var questionMatch = line.match(/^(Câu\s*)?(\d+)[:\.]\s*(.*)/i);
                if (questionMatch) {
                    if (currentQuestion && currentOptions.length > 0) {
                        questions.push({
                            question: currentQuestion,
                            options: currentOptions
                        });
                    }
                    currentQuestion = questionMatch[3] || line;
                    currentOptions = [];
                } else {
                    var optionMatch = line.match(/^([a-d])[\.\)]\s*(.*)/i);
                    if (optionMatch && currentQuestion !== null) {
                        var optText = optionMatch[1] + '. ' + optionMatch[2];
                        if (optionMatch[2].trim().startsWith('*')) {
                            optText = '*' + optionMatch[1] + '. ' + optionMatch[2].trim().substring(1).trim();
                        }
                        currentOptions.push(optText);
                    } else {
                        if (currentQuestion !== null && currentOptions.length === 0) {
                            currentQuestion += ' ' + line;
                        }
                    }
                }
            }
            
            if (currentQuestion && currentOptions.length > 0) {
                questions.push({
                    question: currentQuestion,
                    options: currentOptions
                });
            }
            
            return questions;
        };

        window.startTest = async function(key) {
            var currentUser = JSON.parse(localStorage.getItem("currentUser"));
            if (!currentUser) return;

            try {
                var snapshot = await get(ref(db, 'tests/' + key));
                if (!snapshot.exists()) {
                    alert("Bài test không tồn tại!");
                    return;
                }
                var test = snapshot.val();
                
                if (!test.questions || test.questions.length === 0) {
                    alert("Bài test không có câu hỏi!");
                    return;
                }

                var confirmStart = confirm('📝 ' + test.title + '\n\n' + test.desc + '\n\nSố câu hỏi: ' + test.questions.length + '\nĐiểm đạt: ' + test.passScore + '%\n\nBắt đầu làm test?');
                if (!confirmStart) return;

                var userAnswers = [];
                var score = 0;
                var totalQ = test.questions.length;

                for (var i = 0; i < totalQ; i++) {
                    var q = test.questions[i];
                    var optionsText = q.options.map(function(opt, idx) {
                        var displayOpt = opt.startsWith('*') ? opt.substring(1) : opt;
                        return String.fromCharCode(65 + idx) + '. ' + displayOpt;
                    }).join('\n');
                    
                    var userAnswer = prompt('📝 Câu ' + (i + 1) + '/' + totalQ + '\n\n' + q.question + '\n\n' + optionsText + '\n\nNhập đáp án (A, B, C, D):');
                    
                    if (userAnswer === null) break;
                    
                    userAnswer = userAnswer.trim().toUpperCase();
                    var answerIndex = -1;
                    
                    if (userAnswer === 'A') answerIndex = 0;
                    else if (userAnswer === 'B') answerIndex = 1;
                    else if (userAnswer === 'C') answerIndex = 2;
                    else if (userAnswer === 'D') answerIndex = 3;
                    
                    if (answerIndex === -1 || answerIndex >= q.options.length) {
                        alert('⚠️ Đáp án không hợp lệ! Vui lòng nhập A, B, C hoặc D.');
                        i--;
                        continue;
                    }
                    
                    var isCorrect = q.options[answerIndex].startsWith('*');
                    if (isCorrect) score++;
                    
                    userAnswers.push({
                        question: q.question,
                        selected: q.options[answerIndex],
                        correct: isCorrect
                    });
                }

                var finalScore = Math.round((score / totalQ) * 100);
                var passed = finalScore >= test.passScore;
                var result = passed ? "✅ Đạt" : "❌ Không đạt";
                var rank = finalScore >= 90 ? "🏆 Xuất sắc" :
                           finalScore >= 75 ? "⭐ Giỏi" :
                           finalScore >= 50 ? "📖 Khá" :
                           finalScore >= 30 ? "📝 Trung bình" : "❌ Yếu";

                var resultMsg = '📊 KẾT QUẢ\n\n';
                resultMsg += 'Điểm: ' + finalScore + '/100\n';
                resultMsg += 'Xếp loại: ' + rank + '\n';
                resultMsg += 'Kết quả: ' + result + '\n';
                resultMsg += 'Trả lời đúng: ' + score + '/' + totalQ + ' câu\n\n';
                
                userAnswers.forEach(function(ans, idx) {
                    resultMsg += 'Câu ' + (idx + 1) + ': ' + (ans.correct ? '✅ Đúng' : '❌ Sai') + '\n';
                    resultMsg += '   Đáp án: ' + ans.selected + '\n';
                });
                
                alert(resultMsg);

                await push(ref(db, "testResults"), {
                    testId: key,
                    testTitle: test.title,
                    username: currentUser.username,
                    userName: currentUser.name || currentUser.username,
                    score: finalScore,
                    correctCount: score,
                    totalQuestions: totalQ,
                    rank: rank,
                    result: result,
                    answers: userAnswers,
                    createdAt: new Date().toISOString()
                });

            } catch (err) {
                console.error(err);
                alert("⚠️ Lỗi khi làm test!");
            }
        };

        // Vẽ Doraemon
        function drawDoraemon(ctx, x, y, w, h) {
            ctx.fillStyle = '#2196F3';
            ctx.beginPath();
            ctx.arc(x + w/2, y + h/2 - 5, w/2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(x + w/2, y + h/2 + 5, w/3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#2196F3';
            ctx.beginPath();
            ctx.arc(x + w/2, y + 5, w/2.5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(x + w/2 - 5, y + 8, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + w/2 + 5, y + 8, 8, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(x + w/2 - 7, y + 8, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + w/2 + 3, y + 8, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#FF1744';
            ctx.beginPath();
            ctx.arc(x + w/2 - 2, y + 14, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(x + w/2 - 2, y + 18, 5, 0.1, Math.PI - 0.1);
            ctx.stroke();
            
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1;
            for (var i = -1; i <= 1; i += 2) {
                ctx.beginPath();
                ctx.moveTo(x + w/2 + i * 10, y + 10);
                ctx.lineTo(x + w/2 + i * 25, y + 5 + i * 5);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x + w/2 + i * 10, y + 14);
                ctx.lineTo(x + w/2 + i * 25, y + 14 + i * 5);
                ctx.stroke();
            }
            
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(x + w/2, y + h - 2, 6, 0, Math.PI * 2);
            ctx.fill();
        }

        // Khởi tạo Canvas
        function initGameCanvas() {
            var canvas = document.getElementById('gameCanvas');
            if (!canvas) return;
            
            var ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 800, 350);
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, 800, 350);
            ctx.fillStyle = '#3d3d5c';
            ctx.fillRect(0, groundY, 800, 50);
            ctx.fillStyle = '#4d4d6c';
            ctx.fillRect(0, groundY, 800, 3);
            drawDoraemon(ctx, playerX, playerY, playerWidth, playerHeight);
            
            var highEl = document.getElementById('gameHighScore');
            if (highEl) highEl.textContent = gameHighScore;
        }

        // Bắt đầu game
        window.startGame = function() {
            var canvas = document.getElementById('gameCanvas');
            if (!canvas) {
                alert('⚠️ Không tìm thấy canvas!');
                return;
            }
            
            if (gameRunning) return;
            
            gameRunning = true;
            gameScore = 0;
            obstacles = [];
            gameSpeed = 6;
            playerY = groundY - playerHeight;
            isJumping = false;
            jumpVelocity = 0;
            
            var ctx = canvas.getContext('2d');
            var scoreEl = document.getElementById('gameScore');
            var startBtn = document.getElementById('gameStartBtn');
            if (startBtn) startBtn.textContent = '⏹️ Đang chơi...';
            
            function createObstacle() {
                var types = ['cactus', 'bird', 'rock'];
                var type = types[Math.floor(Math.random() * types.length)];
                var width = type === 'bird' ? 30 : type === 'cactus' ? 20 : 25;
                var height = type === 'bird' ? 25 : type === 'cactus' ? 35 : 20;
                var y = type === 'bird' ? groundY - 60 - Math.random() * 30 : groundY - height;
                
                obstacles.push({
                    x: 800,
                    y: y,
                    width: width,
                    height: height,
                    type: type,
                    scored: false
                });
            }
            
            function drawObstacle(ctx, obs) {
                if (obs.type === 'cactus') {
                    ctx.fillStyle = '#2E7D32';
                    ctx.fillRect(obs.x + 5, obs.y + 10, 10, obs.height - 10);
                    ctx.fillRect(obs.x - 5, obs.y + 15, 8, 15);
                    ctx.fillRect(obs.x + 12, obs.y + 15, 8, 12);
                } else if (obs.type === 'bird') {
                    ctx.fillStyle = '#FF6F00';
                    ctx.beginPath();
                    ctx.arc(obs.x + obs.width/2, obs.y + obs.height/2, obs.width/2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#E65100';
                    ctx.fillRect(obs.x + 2, obs.y - 5, 10, 6);
                    ctx.fillRect(obs.x + 15, obs.y - 5, 10, 6);
                } else {
                    ctx.fillStyle = '#78909C';
                    ctx.beginPath();
                    ctx.ellipse(obs.x + obs.width/2, obs.y + obs.height/2, obs.width/2, obs.height/2, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            function gameLoop() {
                if (!gameRunning) return;
                
                ctx.clearRect(0, 0, 800, 350);
                
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, 800, 350);
                
                ctx.fillStyle = '#2d2d44';
                ctx.fillRect(0, groundY, 800, 50);
                ctx.fillStyle = '#3d3d5c';
                for (var i = 0; i < 800; i += 40) {
                    var offset = (Date.now() / 100 * gameSpeed / 6) % 40;
                    ctx.fillRect(i - offset, groundY, 20, 3);
                }
                
                drawDoraemon(ctx, playerX, playerY, playerWidth, playerHeight);
                
                if (isJumping) {
                    playerY += jumpVelocity;
                    jumpVelocity += gravity;
                    if (playerY >= groundY - playerHeight) {
                        playerY = groundY - playerHeight;
                        isJumping = false;
                        jumpVelocity = 0;
                    }
                }
                
                if (Math.random() < 0.02 + gameSpeed / 400) {
                    createObstacle();
                }
                
                for (var i = obstacles.length - 1; i >= 0; i--) {
                    var obs = obstacles[i];
                    obs.x -= gameSpeed;
                    
                    if (!obs.scored && obs.x + obs.width < playerX) {
                        obs.scored = true;
                        gameScore += 10;
                        if (scoreEl) scoreEl.textContent = gameScore;
                    }
                    
                    if (obs.x < playerX + playerWidth - 10 &&
                        obs.x + obs.width > playerX + 10 &&
                        obs.y < playerY + playerHeight - 5 &&
                        obs.y + obs.height > playerY + 5) {
                        gameRunning = false;
                        if (startBtn) startBtn.textContent = '▶️ Bắt đầu';
                        
                        if (gameScore > gameHighScore) {
                            gameHighScore = gameScore;
                            localStorage.setItem('doraemonHighScore', gameHighScore);
                            var highScoreEl = document.getElementById('gameHighScore');
                            if (highScoreEl) highScoreEl.textContent = gameHighScore;
                            saveScore(gameScore);
                            alert('🎉 KỶ LỤC MỚI! ' + gameScore + ' điểm!');
                        } else {
                            alert('💀 Game Over! Điểm: ' + gameScore);
                        }
                        
                        obstacles = [];
                        return;
                    }
                    
                    if (obs.x + obs.width < -50) {
                        obstacles.splice(i, 1);
                    }
                    
                    drawObstacle(ctx, obs);
                }
                
                if (gameSpeed < 15) {
                    gameSpeed += 0.002;
                }
                
                if (scoreEl) scoreEl.textContent = gameScore;
                
                frameId = requestAnimationFrame(gameLoop);
            }
            
            gameLoop();
        };

        // Nhảy
        window.jumpGame = function() {
            if (!gameRunning) return;
            if (isJumping) return;
            
            isJumping = true;
            jumpVelocity = -12;
        };

        // Reset game
        window.resetGame = function() {
            gameRunning = false;
            if (frameId) {
                cancelAnimationFrame(frameId);
                frameId = null;
            }
            obstacles = [];
            gameScore = 0;
            gameSpeed = 6;
            playerY = groundY - playerHeight;
            isJumping = false;
            jumpVelocity = 0;
            
            var scoreEl = document.getElementById('gameScore');
            if (scoreEl) scoreEl.textContent = '0';
            
            var startBtn = document.getElementById('gameStartBtn');
            if (startBtn) startBtn.textContent = '▶️ Bắt đầu';
            
            var canvas = document.getElementById('gameCanvas');
            if (canvas) {
                var ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, 800, 350);
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, 800, 350);
                ctx.fillStyle = '#3d3d5c';
                ctx.fillRect(0, groundY, 800, 50);
                ctx.fillStyle = '#4d4d6c';
                ctx.fillRect(0, groundY, 800, 3);
                drawDoraemon(ctx, playerX, playerY, playerWidth, playerHeight);
            }
        };

        // Thoát game
        window.exitGame = function() {
            gameRunning = false;
            if (frameId) {
                cancelAnimationFrame(frameId);
                frameId = null;
            }
            window.showPage('games');
        };

        // Lưu điểm
        async function saveScore(score) {
            var currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) return;
            
            var gameTitle = document.getElementById('currentGameTitle')?.textContent || 'Doraemon Run';
            
            try {
                await push(ref(db, "gameScores"), {
                    gameTitle: gameTitle,
                    username: currentUser.username,
                    userName: currentUser.name || currentUser.username,
                    score: score,
                    createdAt: new Date().toISOString()
                });
                loadScores();
            } catch (err) {
                console.error('Lỗi lưu điểm:', err);
            }
        }

        // Tải bảng xếp hạng
        function loadScores() {
            var tbody = document.getElementById('scoreTableBody');
            if (!tbody) return;
            
            onValue(ref(db, "gameScores"), function(snapshot) {
                tbody.innerHTML = '';
                if (!snapshot.exists()) {
                    tbody.innerHTML = '<tr><td colspan="5">Chưa có điểm nào</td></tr>';
                    return;
                }
                
                var scores = [];
                snapshot.forEach(function(child) {
                    var data = child.val();
                    scores.push(data);
                });
                
                scores.sort(function(a, b) { return (b.score || 0) - (a.score || 0); });
                var topScores = scores.slice(0, 20);
                
                topScores.forEach(function(s, idx) {
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>#${idx + 1}</strong></td>
                            <td>${s.userName || s.username || 'Unknown'}</td>
                            <td><strong>${s.score || 0}</strong></td>
                            <td>${s.gameTitle || 'Doraemon Run'}</td>
                            <td>${s.createdAt ? new Date(s.createdAt).toLocaleDateString() : 'N/A'}</td>
                        </tr>
                    `;
                });
            });
        }

        // ===== GIAO DIỆN TRANG GAME =====
        function getGamesPage(user) {
            var canManage = user.role === "Ban Quản Trị";
            var html = '<h2>🎮 Game nội bộ</h2>';

            html += `
                <div style="background:#1a1a2e; border-radius:12px; padding:20px; margin-bottom:20px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
                        <h3 style="color:#fff; margin:0;">🎮 <span id="currentGameTitle">${currentGameTitle}</span></h3>
                        <button onclick="window.exitGame()" class="btn-delete" style="background:#ef4444;">❌ Thoát game</button>
                    </div>
                    <canvas id="gameCanvas" width="800" height="350" style="width:100%; max-width:800px; height:auto; border-radius:8px; background:#1a1a2e; display:block; margin:0 auto;"></canvas>
                    <div style="display:flex; justify-content:space-between; color:#fff; margin-top:10px; font-size:16px; flex-wrap:wrap; gap:10px;">
                        <span>🏆 Điểm: <strong id="gameScore">0</strong></span>
                        <span>🥇 Cao nhất: <strong id="gameHighScore">${gameHighScore}</strong></span>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
                        <button onclick="window.startGame()" class="btn-create" style="background:#10b981;" id="gameStartBtn">▶️ Bắt đầu</button>
                        <button onclick="window.jumpGame()" class="btn-create" style="background:#f59e0b;">⬆️ Nhảy (Space)</button>
                        <button onclick="window.resetGame()" class="btn-delete" style="background:#64748b;">🔄 Chơi lại</button>
                    </div>
                    <p style="color:#94a3b8; font-size:12px; margin-top:8px;">⌨️ <strong>Phím Space</strong> để Bắt đầu / Nhảy | Click chuột vào màn hình để nhảy</p>
                </div>
            `;

            if (canManage) {
                html += `
                    <div class="account-form-box">
                        <h3>🎯 Tạo game mới</h3>
                        <div style="display:flex; flex-direction:column; gap:12px;">
                            <input type="text" id="gameTitle" placeholder="Tên game (VD: Doraemon Run)" value="Doraemon Run" />
                            <textarea id="gameDesc" placeholder="Mô tả game..." style="min-height:60px;">Chạy cùng Doraemon, tránh chướng ngại vật!</textarea>
                            <button onclick="window.addGame()" class="btn-create" style="align-self:flex-start;">🎮 Tạo game & Chơi</button>
                        </div>
                    </div>
                `;
            } else {
                html += '<p style="color:#94a3b8; margin-bottom:16px;">🔒 Chế độ chỉ xem. Chỉ Ban Quản Trị mới tạo được game.</p>';
            }

            html += `
                <div class="table-container">
                    <table class="table">
                        <thead><tr><th>Tên game</th><th>Mô tả</th><th>Điểm cao nhất</th><th>Người giữ kỷ lục</th><th>Thao tác</th></tr></thead>
                        <tbody id="gameTableBody"><tr><td colspan="5">Đang tải...</td></tr></tbody>
                    </table>
                </div>
                
                <div style="margin-top:24px;">
                    <h3>🏆 Bảng xếp hạng game</h3>
                    <div class="table-container">
                        <table class="table">
                            <thead><tr><th>#</th><th>Người chơi</th><th>Điểm</th><th>Game</th><th>Ngày</th></tr></thead>
                            <tbody id="scoreTableBody"><tr><td colspan="5">Đang tải...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            `;

            setTimeout(function() {
                initGameCanvas();
            }, 100);

            return html;
        }

        // ===== TẠO GAME =====
        window.addGame = async function() {
            var currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || currentUser.role !== "Ban Quản Trị") {
                alert("⛔ Chỉ Ban Quản Trị mới có quyền tạo game!");
                return;
            }
            
            var title = document.getElementById("gameTitle")?.value.trim() || 'Doraemon Run';
            var desc = document.getElementById("gameDesc")?.value.trim() || 'Chạy cùng Doraemon!';
            
            try {
                await push(ref(db, "games"), {
                    title: title,
                    desc: desc,
                    type: 'Doraemon Run',
                    createdBy: currentUser.username,
                    createdAt: new Date().toISOString()
                });
                
                alert("✅ Tạo game thành công!");
                window.showPage('games');
                
            } catch (err) {
                console.error(err);
                alert("⚠️ Lỗi khi tạo game!");
            }
        };

        // ===== CHƠI GAME =====
        window.playGame = async function(key) {
            try {
                var snapshot = await get(ref(db, 'games/' + key));
                if (!snapshot.exists()) {
                    alert("Game không tồn tại!");
                    return;
                }
                var game = snapshot.val();
                
                currentGameTitle = game.title || 'Doraemon Run';
                var titleEl = document.getElementById('currentGameTitle');
                if (titleEl) titleEl.textContent = currentGameTitle;
                
                window.showPage('games');
                
                setTimeout(function() {
                    initGameCanvas();
                }, 200);
                
            } catch (err) {
                console.error(err);
                alert("⚠️ Lỗi khi chơi game!");
            }
        };

        // ===== XÓA GAME =====
        window.deleteGame = async function(key) {
            var currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || currentUser.role !== "Ban Quản Trị") {
                alert("⛔ Chỉ Ban Quản Trị mới có quyền xóa game!");
                return;
            }
            
            if (!confirm("Bạn có chắc chắn muốn xóa game này?")) return;

            try {
                await remove(ref(db, 'games/' + key));
                alert("✅ Đã xóa game!");
            } catch (err) {
                console.error(err);
                alert("⚠️ Lỗi khi xóa game!");
            }
        };

        // ===== LOAD GAMES =====
        function loadGames() {
            var tbody = document.getElementById("gameTableBody");
            if (!tbody) return;
            var currentUser = JSON.parse(localStorage.getItem('currentUser'));
            var isAdmin = currentUser && currentUser.role === "Admin";
            var isBQT = currentUser && currentUser.role === "Ban Quản Trị";

            onValue(ref(db, "games"), function(snapshot) {
                tbody.innerHTML = "";
                if (!snapshot.exists()) {
                    tbody.innerHTML = '<tr><td colspan="5">Chưa có game nào</td></tr>';
                    return;
                }
                snapshot.forEach(function(child) {
                    var game = child.val();
                    var key = child.key;
                    
                    var actions = "";
                    if (isAdmin) {
                        actions = '<span class="badge-default">Chỉ xem</span>';
                    } else if (isBQT) {
                        actions = `
                            <button onclick="window.playGame('${key}')" class="btn-create" style="background:#10b981;">🎮 Chơi</button>
                            <button onclick="window.deleteGame('${key}')" class="btn-delete">🗑️ Xóa</button>
                        `;
                    } else {
                        actions = `<button onclick="window.playGame('${key}')" class="btn-create" style="background:#10b981;">🎮 Chơi</button>`;
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${game.title || "N/A"}</strong></td>
                            <td>${game.desc || ""}</td>
                            <td><span id="highScore_${key}">...</span></td>
                            <td><span id="highScorePlayer_${key}">...</span></td>
                            <td>${actions}</td>
                        </tr>
                    `;
                    
                    loadGameHighScore(key);
                });
            });
        }

        function loadGameHighScore(gameKey) {
            get(ref(db, "gameScores")).then(function(snapshot) {
                if (!snapshot.exists()) return;
                
                var scores = [];
                snapshot.forEach(function(child) {
                    var data = child.val();
                    if (data.gameTitle === gameKey || data.gameId === gameKey) {
                        scores.push(data);
                    }
                });
                
                scores.sort(function(a, b) { return (b.score || 0) - (a.score || 0); });
                
                var highScoreEl = document.getElementById('highScore_' + gameKey);
                var highScorePlayerEl = document.getElementById('highScorePlayer_' + gameKey);
                
                if (scores.length > 0) {
                    if (highScoreEl) highScoreEl.textContent = scores[0].score || 0;
                    if (highScorePlayerEl) highScorePlayerEl.textContent = scores[0].userName || scores[0].username || 'Unknown';
                } else {
                    if (highScoreEl) highScoreEl.textContent = '0';
                    if (highScorePlayerEl) highScorePlayerEl.textContent = '-';
                }
            }).catch(function() {});
        }

        // ==========================================
        // CÀI ĐẶT
        // ==========================================
        function getSettingsPage(user) {
            if (user.role !== "Ban Quản Trị") {
                return '<h2>⛔ Bạn không có quyền truy cập trang này</h2>';
            }
            return `
                <h2>⚙️ Cài đặt hệ thống</h2>
                <div class="account-form-box">
                    <h3>🛡️ Bảo trì hệ thống</h3>
                    <div class="inline-form">
                        <select id="maintenanceSelect">
                            <option value="off">🟢 Bình thường</option>
                            <option value="on">🔴 Bảo trì</option>
                        </select>
                        <button onclick="window.saveSettings()" class="btn-create">Lưu</button>
                    </div>
                </div>
                <div class="account-form-box">
                    <h3>💾 Sao lưu dữ liệu</h3>
                    <button onclick="window.backupData()" class="btn-create" style="background:#3b82f6;">📥 Xuất file backup</button>
                </div>
            `;
        }

        function loadSettings() {
            var select = document.getElementById("maintenanceSelect");
            if (!select) return;
            get(ref(db, "system_config/maintenance")).then(function(snapshot) {
                if (snapshot.exists()) select.value = snapshot.val();
            }).catch(function() {});
        }

        window.saveSettings = async function() {
            var maintenance = document.getElementById("maintenanceSelect")?.value;
            try {
                await update(ref(db, "system_config"), {
                    maintenance: maintenance || "off",
                    lastUpdated: new Date().toLocaleString()
                });
                alert("✅ Đã lưu cài đặt!");
            } catch (err) {
                console.error(err);
                alert("⚠️ Lỗi khi lưu!");
            }
        };

        window.backupData = async function() {
            try {
                var snapshot = await get(ref(db));
                if (!snapshot.exists()) {
                    alert("Không có dữ liệu để backup!");
                    return;
                }
                var dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(
                    JSON.stringify(snapshot.val(), null, 4)
                );
                var a = document.createElement("a");
                a.href = dataStr;
                a.download = "backup_" + new Date().toISOString().slice(0, 10) + ".json";
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (err) {
                console.error(err);
                alert("⚠️ Lỗi backup!");
            }
        };

        // ==========================================
        // HỒ SƠ CÁ NHÂN
        // ==========================================
        function getProfilePage(user) {
            return `
                <h2>👤 Hồ sơ cá nhân</h2>
                <div class="account-form-box" style="max-width:500px;">
                    <div class="form-group">
                        <label>Mã tài khoản</label>
                        <input type="text" id="profileUsername" value="${user.username}" readonly style="background:#f1f5f9;" />
                    </div>
                    <div class="form-group">
                        <label>Họ và tên</label>
                        <input type="text" id="profileName" value="${user.name || ""}" />
                    </div>
                    <div class="form-group">
                        <label>Chức vụ</label>
                        <input type="text" id="profileRole" value="${user.role}" readonly style="background:#f1f5f9;" />
                    </div>
                    <button onclick="window.updateProfile()" class="btn-create">Cập nhật</button>
                </div>
            `;
        }

        function loadProfile() {
            var currentUser = JSON.parse(localStorage.getItem("currentUser"));
            if (!currentUser) return;
            var nameInput = document.getElementById("profileName");
            if (nameInput) nameInput.value = currentUser.name || "";
        }

        window.updateProfile = async function() {
            var currentUser = JSON.parse(localStorage.getItem("currentUser"));
            if (!currentUser) return;
            var name = document.getElementById("profileName")?.value.trim();
            if (!name) {
                alert("⚠️ Họ và tên không được để trống!");
                return;
            }
            try {
                await update(ref(db, 'users/' + currentUser.username), { name: name });
                currentUser.name = name;
                localStorage.setItem("currentUser", JSON.stringify(currentUser));
                alert("✅ Cập nhật thành công!");
                var nameEl = document.querySelector(".user-info .name");
                if (nameEl) nameEl.textContent = name;
            } catch (err) {
                console.error(err);
                alert("⚠️ Lỗi khi cập nhật!");
            }
        };

        // ===== ĐĂNG XUẤT =====
        window.logout = function() {
            localStorage.removeItem("currentUser");
            window.location.href = "index.html";
        };

        // ==========================================
        // ĐIỀU KHIỂN PHÍM SPACE (START + JUMP)
        // ==========================================
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                
                // Nếu game chưa chạy -> BẮT ĐẦU
                if (!gameRunning) {
                    window.startGame();
                } else {
                    // Nếu đang chạy -> NHẢY
                    window.jumpGame();
                }
            }
        });

        // ===== CLICK CANVAS ĐỂ NHẢY =====
        document.addEventListener('click', function(e) {
            if (e.target.id === 'gameCanvas') {
                if (!gameRunning) {
                    window.startGame();
                } else {
                    window.jumpGame();
                }
            }
        });

        console.log("✅ Dashboard đã tải thành công!");
        console.log("🔍 window.showPage:", typeof window.showPage);
        console.log("🔍 window.startGame:", typeof window.startGame);
        console.log("🔍 window.jumpGame:", typeof window.jumpGame);
        console.log("🎮 Chơi game: Nhấn SPACE để bắt đầu và nhảy!");
    </script>

</body>
